<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trắc Nghiệm Đám Mây v2</title>
  
  <!-- Tải React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Tải Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tải Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tải Firebase Compat -->
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
  
  <style>
    body { -webkit-font-smoothing: antialiased; }
    .animate-fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Tùy chỉnh thanh cuộn cho text area */
    textarea::-webkit-scrollbar { width: 8px; }
    textarea::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==========================================
    // NƠI ĐIỀN CẤU HÌNH FIREBASE CỦA HUY
    // ==========================================
    const MY_FIREBASE_CONFIG = {
  apiKey: "AIzaSyBPYnBhPME-BTST63QDyP0gUho07G9QyQc",
  authDomain: "tracnghiem-31c44.firebaseapp.com",
  projectId: "tracnghiem-31c44",
  storageBucket: "tracnghiem-31c44.firebasestorage.app",
  messagingSenderId: "742429088050",
  appId: "1:742429088050:web:9ff00733cc280a1e49df2b",
  measurementId: "G-VNXTHZV6ZH"
};

    // --- KHỞI TẠO HỆ THỐNG ---
    let finalConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : MY_FIREBASE_CONFIG;
    let auth = null;
    let db = null;
    let isSetupNeeded = false;
    let appId = typeof __app_id !== 'undefined' ? __app_id : 'quiz-app-huy-github';

    if (!finalConfig || !finalConfig.apiKey) {
      isSetupNeeded = true;
    } else {
      try {
        if (!firebase.apps.length) firebase.initializeApp(finalConfig);
        auth = firebase.auth();
        db = firebase.firestore();
      } catch(e) {
        console.error("Lỗi khởi tạo Firebase:", e);
        isSetupNeeded = true;
      }
    }

    const quizzesPath = `artifacts/${appId}/public/data/quizzes`;
    const usersPath = `artifacts/${appId}/public/data/users`;

    // --- TIỆN ÍCH ---
    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    const generateShareCode = () => {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let result = '';
      for (let i = 0; i < 6; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
      return result;
    };

    const generateId = () => Math.random().toString(36).substr(2, 9);

    // --- ICONS ---
    const Icons = {
      Upload: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>,
      Image: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
      Check: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
      Logout: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>,
      Share: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg>,
      Play: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      Copy: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>,
      Trash: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
      User: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
    };

    // --- COMPONENT MÀN HÌNH SETUP THIẾU CẤU HÌNH ---
    function SetupScreen() {
      return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100 font-sans">
          <div className="max-w-2xl bg-white p-8 rounded-3xl shadow-xl border border-red-100 text-center">
            <h1 className="text-3xl font-black text-red-600 mb-4">Chưa có kết nối Database!</h1>
            <p className="text-slate-600 mb-4">Hãy dán đoạn mã <code>firebaseConfig</code> của bạn vào dòng số 38 trong code nhé.</p>
          </div>
        </div>
      );
    }

    // --- COMPONENT TRẢ LỜI NGẮN (Có inputMode="decimal" để gọi bàn phím số) ---
    const ShortAnswerInput = ({ value = '', onChange, readOnly, isCorrect, showResult }) => {
      const chars = (value || '').split('');
      const boxes = [0, 1, 2, 3];
      let borderColorClass = showResult ? (isCorrect ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50') : (value ? 'border-blue-500 bg-blue-50' : 'border-slate-300');
      let textColorClass = showResult ? (isCorrect ? 'text-green-700' : 'text-red-700') : 'text-slate-800';

      return (
        <div className="relative inline-flex gap-2 group">
          {boxes.map(i => (
            <div key={i} className={`w-12 h-14 flex items-center justify-center text-2xl font-bold border-2 rounded-xl transition-colors duration-200 ${borderColorClass} ${textColorClass} shadow-sm group-hover:border-blue-400 bg-white`}>
              {chars[i] || ''}
            </div>
          ))}
          <input type="text" inputMode="decimal" pattern="[0-9\.\,\-]*" className="absolute inset-0 w-full h-full opacity-0 cursor-text z-10" value={value}
            onChange={(e) => {
              const filteredValue = e.target.value.replace(/[^0-9\.\,\-]/g, '').slice(0, 4);
              onChange(filteredValue);
            }} readOnly={readOnly} autoComplete="off" />
        </div>
      );
    };

    // ================= APP CHÍNH =================
    function MainApp() {
      const [fbUser, setFbUser] = useState(null);
      const [currentUser, setCurrentUser] = useState(null); 
      
      const [screen, setScreen] = useState('home'); // home, dashboard, input, settings, quiz, result
      const [allQuizzes, setAllQuizzes] = useState([]);
      const [globalMessage, setGlobalMessage] = useState({ text: '', type: 'error' });
      const [confirmDeleteId, setConfirmDeleteId] = useState(null);

      // Input State
      const [inputTab, setInputTab] = useState('mc'); // mc, tf, sa, rc, file
      const [rawTexts, setRawTexts] = useState({ mc: '', tf: '', sa: '', rc: '', file: '' });

      // Quiz State
      const [isReadOnly, setIsReadOnly] = useState(false);
      const [currentQuizCode, setCurrentQuizCode] = useState(null);
      const [parsedData, setParsedData] = useState({ mc: [], tf: [], sa: [], rc: [] });
      const [config, setConfig] = useState({ mode: 'single', shuffle: 'none' });
      
      // Gameplay State
      const [activeQuiz, setActiveQuiz] = useState({ mc: [], tf: [], sa: [], rc: [], flat: [] });
      const [answers, setAnswers] = useState({}); 
      const [currentIndex, setCurrentIndex] = useState(0); 
      const [isSubmitted, setIsSubmitted] = useState(false); 
      const [singleQuestionConfirmed, setSingleQuestionConfirmed] = useState(false); 
      const [score, setScore] = useState({ correct: 0, total: 0 });

      const showMessage = (text, type = 'error') => {
        setGlobalMessage({ text, type });
        setTimeout(() => setGlobalMessage({ text: '', type: 'error' }), 3500);
      };

      const copyToClipboard = async (text) => {
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
            showMessage("Đã copy mã: " + text, "success");
            return;
          }
        } catch (err) {}
        const textArea = document.createElement("textarea");
        textArea.value = text; textArea.style.position = "fixed"; textArea.style.opacity = "0";
        document.body.appendChild(textArea); textArea.focus(); textArea.select();
        try { document.execCommand('copy'); showMessage("Đã copy mã: " + text, "success"); } 
        catch (err) { showMessage("Bôi đen để copy mã nhé.", "error"); }
        document.body.removeChild(textArea);
      };

      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try { await auth.signInAnonymously(); } catch (error) { console.error(error); }
        };
        initAuth();
        const unsub = auth.onAuthStateChanged((u) => setFbUser(u));
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!fbUser || !db) return;
        const unsub = db.collection(quizzesPath).onSnapshot((snap) => {
          const list = [];
          snap.forEach(docSnap => {
             const data = docSnap.data();
             const currentExpires = data.expiresAt || (data.createdAt + 30 * 24 * 60 * 60 * 1000);
             list.push({ id: docSnap.id, ...data, expiresAt: currentExpires });
          });
          setAllQuizzes(list);
        }, (err) => console.error(err));
        return () => unsub();
      }, [fbUser]);

      useEffect(() => {
        if (!currentUser || !db) return;
        const now = Date.now();
        allQuizzes.forEach(q => {
          if (q.expiresAt < now && q.owner === currentUser.username.toLowerCase()) {
            db.doc(`${quizzesPath}/${q.id}`).delete().catch(e => {});
          }
        });
      }, [allQuizzes, currentUser]);

      // --- LOGIN / GUEST ---
      const handleLogin = async (e) => {
        e.preventDefault();
        const uname = e.target.username.value.trim();
        const pwd = e.target.password.value;
        if (!uname || !pwd) return showMessage("Vui lòng nhập đủ thông tin.");

        const userRef = db.doc(`${usersPath}/${uname.toLowerCase()}`);
        try {
          const userSnap = await userRef.get();
          if (userSnap.exists) {
            if (userSnap.data().password === pwd) {
              setCurrentUser({ username: userSnap.data().username });
              setScreen('dashboard');
            } else showMessage("Sai mật khẩu!");
          } else {
            await userRef.set({ username: uname, password: pwd });
            setCurrentUser({ username: uname });
            setScreen('dashboard');
            showMessage("Tạo tài khoản thành công!", "success");
          }
        } catch (error) { showMessage("Lỗi kết nối mạng."); }
      };

      const handleGuestJoin = async (e) => {
        e.preventDefault();
        const code = e.target.shareCode.value.trim().toUpperCase();
        if (code.length !== 6) return showMessage("Mã đề gồm 6 ký tự.");

        const qDoc = allQuizzes.find(q => q.code === code && q.expiresAt > Date.now());
        if (qDoc) {
          // Lọc rỗng nếu dữ liệu cũ ko có rc
          const safeParsed = { mc: [], tf: [], sa: [], rc: [], ...qDoc.parsedData };
          setParsedData(safeParsed);
          setIsReadOnly(true);
          setCurrentQuizCode(code);
          setScreen('settings'); // Hiện overview trước khi vào quiz
        } else {
          showMessage("Mã không đúng hoặc đề đã hết hạn!");
        }
      };

      // --- PARSING ENGINE ---
      const parseTextEngine = (text, forcedType) => {
        let result = [];
        let currentQ = null;
        let currentSubQ = null;

        const lines = text.split('\n');
        for (let line of lines) {
          line = line.trim();
          if (!line) continue;

          // 1. Check Parent Question (Câu XX. hoặc Câu XX:)
          const qMatch = line.match(/^[Cc][âa]u\s*\d+[\.\:]\s*(.*)/);
          if (qMatch) {
            if (currentQ) result.push(currentQ);
            currentQ = { id: generateId(), text: qMatch[1] || "", type: forcedType !== 'mixed' ? forcedType : null, options: [], subQuestions: [], image: null };
            currentSubQ = null;
            continue;
          }

          // 2. Check Sub-Question for RC (#1. hoặc #1:)
          const subQMatch = line.match(/^#\d+[\.\:]\s*(.*)/);
          if (subQMatch && currentQ) {
            currentQ.type = 'rc';
            currentSubQ = { id: generateId(), text: subQMatch[1] || "", options: [] };
            currentQ.subQuestions.push(currentSubQ);
            continue;
          }

          // 3. Check Options (A. hoặc A) hoặc *A.)
          const optMatch = line.match(/^(\*?)([A-Za-zĐđ])[\.\)]\s*(.*)/);
          if (optMatch) {
            const optObj = { id: generateId(), text: optMatch[3], isCorrect: optMatch[1] === '*' };
            if (currentSubQ) {
              currentSubQ.options.push(optObj);
            } else if (currentQ) {
              currentQ.options.push(optObj);
              if (!currentQ.type) currentQ.type = 'mc'; // Fallback for mixed
            }
            continue;
          }

          // 4. Check Short Answer (*ans*)
          const saMatch = line.match(/^\*\s*(.+?)\s*\*$/);
          if (saMatch && currentQ && !currentSubQ && currentQ.options.length === 0) {
            currentQ.type = 'sa';
            currentQ.options.push({ id: generateId(), text: saMatch[1], isCorrect: true });
            continue;
          }

          // 5. Append generic text
          if (currentSubQ) {
            if (currentSubQ.options.length === 0) currentSubQ.text += '\n' + line;
            else currentSubQ.options[currentSubQ.options.length - 1].text += '\n' + line;
          } else if (currentQ) {
            if (currentQ.options.length === 0) currentQ.text += '\n' + line;
            else currentQ.options[currentQ.options.length - 1].text += '\n' + line;
          }
        }
        if (currentQ) result.push(currentQ);
        return result;
      };

      const handleParse = () => {
        let allMC = [], allTF = [], allSA = [], allRC = [];

        // Quét từng tab
        allMC.push(...parseTextEngine(rawTexts.mc, 'mc'));
        allTF.push(...parseTextEngine(rawTexts.tf, 'tf'));
        allSA.push(...parseTextEngine(rawTexts.sa, 'sa'));
        allRC.push(...parseTextEngine(rawTexts.rc, 'rc'));

        // Quét tab hỗn hợp / File
        const mixedItems = parseTextEngine(rawTexts.file, 'mixed');
        mixedItems.forEach(item => {
          if (item.type === 'mc') allMC.push(item);
          else if (item.type === 'tf') allTF.push(item);
          else if (item.type === 'sa') allSA.push(item);
          else if (item.type === 'rc') allRC.push(item);
        });

        if (allMC.length === 0 && allTF.length === 0 && allSA.length === 0 && allRC.length === 0) {
          return showMessage('Không tìm thấy câu hỏi đúng định dạng ở bất kỳ phần nào!');
        }

        setParsedData({ mc: allMC, tf: allTF, sa: allSA, rc: allRC });
        setScreen('settings');
      };

      // --- LƯU / QUẢN LÝ ---
      const saveQuiz = async () => {
        if (!fbUser || !currentUser || !db) return;
        const dataStr = JSON.stringify(parsedData);
        if (dataStr.length > 900000) return showMessage("Đề có chứa ảnh quá lớn!");

        const code = generateShareCode();
        // Lấy title từ nội dung có chữ đầu tiên
        let titleLine = "Đề thi không tên";
        const allText = Object.values(rawTexts).join('\n');
        const firstLine = allText.split('\n').find(l => l.trim().length > 0);
        if(firstLine) titleLine = firstLine.length > 50 ? firstLine.substring(0, 50) + "..." : firstLine;

        const docRef = db.doc(`${quizzesPath}/${code}`);
        const now = Date.now();
        const expiresAt = now + 30 * 24 * 60 * 60 * 1000;

        try {
          await docRef.set({ code, owner: currentUser.username.toLowerCase(), title: titleLine, parsedData, rawTexts, createdAt: now, expiresAt });
          setCurrentQuizCode(code);
          copyToClipboard(code); 
        } catch (error) { showMessage("Lỗi khi lưu đề!"); }
      };

      const handleDeleteQuiz = async (quizId) => {
        try { await db.doc(`${quizzesPath}/${quizId}`).delete(); setConfirmDeleteId(null); } catch (e) {}
      };
      const handleExtendQuiz = async (q) => {
        const max = q.createdAt + 50 * 24 * 60 * 60 * 1000; 
        let newEx = q.expiresAt + 7 * 24 * 60 * 60 * 1000;
        if (newEx > max) newEx = max;
        try { await db.doc(`${quizzesPath}/${q.id}`).update({ expiresAt: newEx }); showMessage("Đã gia hạn!", "success"); } catch (e) {}
      };

      // --- LOGIC LÀM ĐỀ ---
      const prepareQuiz = () => {
        let finalMc = [...parsedData.mc], finalTf = [...parsedData.tf], finalSa = [...parsedData.sa], finalRc = [...(parsedData.rc || [])];
        const shuffleOpts = config.shuffle === 'options' || config.shuffle === 'both';
        const shuffleQ = config.shuffle === 'questions' || config.shuffle === 'both';

        if (shuffleQ) {
          finalMc = shuffleArray(finalMc); finalTf = shuffleArray(finalTf); finalSa = shuffleArray(finalSa); finalRc = shuffleArray(finalRc);
        }
        if (shuffleOpts) {
          finalMc.forEach(q => { q.options = shuffleArray(q.options); });
          finalTf.forEach(q => { q.options = shuffleArray(q.options); });
          finalRc.forEach(q => { q.subQuestions.forEach(sq => { sq.options = shuffleArray(sq.options); }) });
        }

        setActiveQuiz({ mc: finalMc, tf: finalTf, sa: finalSa, rc: finalRc, flat: [...finalMc, ...finalTf, ...finalSa, ...finalRc] });
        setAnswers({}); setCurrentIndex(0); setIsSubmitted(false); setSingleQuestionConfirmed(false);
        
        let rcQCount = finalRc.reduce((acc, q) => acc + q.subQuestions.length, 0);
        setScore({ correct: 0, total: finalMc.length + finalTf.length + finalSa.length + rcQCount });
        setScreen('quiz');
      };

      const checkQuestionCorrect = (type, qObj, userAns) => {
        if (type === 'mc' || type === 'rc') { // rc subQuestions behave like MC
          const correctIds = qObj.options.filter(o => o.isCorrect).map(o => o.id);
          return Array.isArray(userAns) && userAns.length > 0 && correctIds.includes(userAns[0]);
        } else if (type === 'tf') {
          const correctIds = qObj.options.filter(o => o.isCorrect).map(o => o.id);
          return Array.isArray(userAns) && userAns.length === correctIds.length && userAns.every(id => correctIds.includes(id));
        } else if (type === 'sa') {
          if (typeof userAns !== 'string' || !userAns.trim()) return false;
          const cleanUser = userAns.trim().replace(',', '.');
          const cleanCorrect = qObj.options[0].text.trim().replace(',', '.');
          if (!isNaN(parseFloat(cleanUser)) && !isNaN(parseFloat(cleanCorrect))) return parseFloat(cleanUser) === parseFloat(cleanCorrect);
          return cleanUser.toLowerCase() === cleanCorrect.toLowerCase();
        }
        return false;
      };

      // ================= CÁC MÀN HÌNH (RENDER) =================

      const Notification = () => (
        globalMessage.text && (
          <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded-full shadow-lg font-bold text-white text-center animate-fade-in ${globalMessage.type === 'success' ? 'bg-green-600' : 'bg-red-600'}`}>
            {globalMessage.text}
          </div>
        )
      );

      // --- MÀN HÌNH CHÍNH TÁCH BIỆT ---
      if (screen === 'home') {
        return (
          <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
            <Notification />
            <div className="max-w-5xl w-full grid md:grid-cols-2 gap-6 animate-fade-in">
              
              {/* Bên trái: Học sinh làm bài */}
              <div className="bg-gradient-to-br from-indigo-500 to-blue-600 rounded-3xl p-8 text-white shadow-xl flex flex-col justify-center">
                <div className="mb-8">
                  <span className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-4 inline-block">Dành cho Người thi</span>
                  <h1 className="text-4xl font-black mb-2">Vào Thi Ngay</h1>
                  <p className="text-blue-100">Không cần đăng nhập. Chỉ cần nhập mã đề được chia sẻ để bắt đầu làm bài.</p>
                </div>
                <form onSubmit={handleGuestJoin} className="bg-white/10 p-2 rounded-2xl flex gap-2 border border-white/20 backdrop-blur-sm">
                  <input type="text" name="shareCode" placeholder="Nhập mã 6 ký tự..." maxLength="6" className="w-full bg-transparent px-4 py-3 text-xl font-bold uppercase placeholder-blue-200 outline-none" required />
                  <button type="submit" className="bg-white text-blue-600 px-6 font-bold rounded-xl shadow hover:bg-slate-50 transition">VÀO</button>
                </form>
              </div>

              {/* Bên phải: Giáo viên tạo đề */}
              <div className="bg-white rounded-3xl p-8 shadow-xl border border-slate-200 flex flex-col justify-center">
                <div className="mb-6">
                  <span className="bg-slate-100 text-slate-500 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-4 inline-block">Dành cho Người ra đề</span>
                  <h2 className="text-3xl font-black text-slate-800 mb-2">Quản Lý Đề Thi</h2>
                  <p className="text-slate-500">Đăng nhập để tạo đề, lưu trữ đám mây và chia sẻ mã cho mọi người.</p>
                </div>
                <form onSubmit={handleLogin} className="space-y-4">
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-1">Tên tài khoản</label>
                    <input type="text" name="username" placeholder="Tên để quản lý đề..." required className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-1">Mật khẩu</label>
                    <input type="password" name="password" placeholder="••••••••" required className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" />
                  </div>
                  <button type="submit" className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl transition shadow mt-2 flex items-center justify-center gap-2">
                    <Icons.User /> Đăng Nhập / Đăng Ký
                  </button>
                </form>
              </div>

            </div>
          </div>
        );
      }

      // --- MÀN HÌNH DASHBOARD (Chỉ khi đã login) ---
      if (screen === 'dashboard') {
        const now = Date.now();
        const myQuizzes = allQuizzes.filter(q => q.owner === currentUser?.username.toLowerCase() && q.expiresAt > now).sort((a,b) => b.createdAt - a.createdAt);

        return (
          <div className="min-h-screen p-4 md:p-8 animate-fade-in">
            <Notification />
            <div className="max-w-5xl mx-auto">
              <div className="flex justify-between items-center mb-8 bg-white p-4 px-6 rounded-2xl shadow-sm border border-slate-200">
                <div className="text-xl font-bold text-slate-800">Xin chào, <span className="text-blue-600">{currentUser?.username}</span>!</div>
                <button onClick={() => { setCurrentUser(null); setScreen('home'); }} className="flex items-center gap-2 text-slate-500 hover:text-red-600 font-bold transition">Đăng xuất</button>
              </div>

              <div className="flex justify-between items-end mb-6">
                <h2 className="text-2xl font-black text-slate-800">Kho đề thi của bạn</h2>
                <button onClick={() => { 
                  setRawTexts({ mc:'', tf:'', sa:'', rc:'', file:'' }); setInputTab('mc');
                  setParsedData({mc:[], tf:[], sa:[], rc:[]}); setIsReadOnly(false); setCurrentQuizCode(null); setScreen('input'); 
                }} className="bg-blue-600 text-white font-bold px-6 py-3 rounded-xl hover:bg-blue-700 transition shadow-md">+ TẠO ĐỀ MỚI</button>
              </div>

              {myQuizzes.length === 0 ? (
                <div className="bg-white rounded-3xl p-12 text-center text-slate-400 border border-dashed border-slate-300">Chưa có đề nào được tạo.</div>
              ) : (
                <div className="grid md:grid-cols-2 gap-5">
                  {myQuizzes.map(q => {
                    const daysLeft = Math.ceil((q.expiresAt - now) / 86400000);
                    return (
                      <div key={q.id} className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 hover:border-blue-300 transition flex flex-col justify-between">
                        <div>
                          <h3 className="font-bold text-slate-800 mb-2 line-clamp-2">{q.title}</h3>
                          <div className="flex justify-between text-xs mb-4">
                            <span className="text-slate-400">{new Date(q.createdAt).toLocaleDateString('vi-VN')}</span>
                            <span className={daysLeft <= 5 ? "text-red-500 font-bold" : "text-amber-500 font-bold"}>Hết hạn sau {daysLeft} ngày</span>
                          </div>
                          <div className="flex items-center justify-between bg-blue-50 p-3 rounded-xl mb-4 border border-blue-100">
                            <span className="text-blue-800 font-mono font-black text-lg">{q.code}</span>
                            <button onClick={() => copyToClipboard(q.code)} className="text-blue-600 hover:bg-blue-200 px-3 py-1 rounded-lg font-bold transition text-sm">Copy</button>
                          </div>
                        </div>
                        <div className="flex items-center gap-2 pt-3 border-t border-slate-100 relative">
                          <button onClick={() => { 
                            setParsedData(q.parsedData); 
                            // Phục hồi rawTexts nếu có, không thì ném hết vào file
                            if(q.rawTexts) setRawTexts(q.rawTexts); else setRawTexts({...rawTexts, file: q.rawText});
                            setIsReadOnly(false); setCurrentQuizCode(q.code); setScreen('settings'); 
                          }} className="flex-1 bg-slate-100 py-2 rounded-lg font-bold text-slate-700 hover:bg-slate-200 transition">Sửa Đề</button>
                          
                          <button onClick={() => handleExtendQuiz(q)} className="px-3 py-2 bg-emerald-50 text-emerald-700 font-bold rounded-lg hover:bg-emerald-100 text-sm transition">+7 Ngày</button>
                          
                          {confirmDeleteId === q.id ? (
                            <div className="absolute right-0 bottom-12 bg-white p-2 rounded-xl shadow-xl border border-red-200 flex gap-2">
                              <button onClick={() => handleDeleteQuiz(q.id)} className="bg-red-500 text-white px-3 py-1 font-bold rounded text-sm">Xóa</button>
                              <button onClick={() => setConfirmDeleteId(null)} className="bg-slate-200 px-3 py-1 font-bold rounded text-sm">Hủy</button>
                            </div>
                          ) : (
                            <button onClick={() => setConfirmDeleteId(q.id)} className="p-2 text-red-400 bg-red-50 rounded-lg hover:bg-red-500 hover:text-white transition"><Icons.Trash /></button>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        );
      }

      // --- MÀN HÌNH NHẬP TEXT (Có Tabs) ---
      if (screen === 'input') {
        const tabs = [
          { id: 'mc', label: 'I. Trắc nghiệm' },
          { id: 'tf', label: 'II. Đúng sai' },
          { id: 'sa', label: 'III. Trả lời ngắn' },
          { id: 'rc', label: 'IV. Đọc hiểu' },
          { id: 'file', label: 'Tải File .txt' }
        ];

        const placeholders = {
          mc: "Câu 1. Nội dung câu hỏi trắc nghiệm\nA. Lựa chọn 1\n*B. Lựa chọn đúng\nC. Lựa chọn 3",
          tf: "Câu 2: Nội dung câu hỏi đúng sai\na) Mệnh đề 1\n*b) Mệnh đề 2 (Đúng)\nc) Mệnh đề 3",
          sa: "Câu 3. Nội dung câu hỏi trả lời ngắn\n*4.5* \n(Lưu ý: Đáp án để giữa 2 dấu sao)",
          rc: "Câu 4. Đây là đoạn văn chung dùng cho các câu hỏi phụ bên dưới.\n#1. Câu hỏi phụ 1 của đoạn văn?\nA. Lựa chọn\n*B) Lựa chọn đúng\n#2: Câu hỏi phụ số 2\n*a. Đúng\nb. Sai",
          file: "Dán toàn bộ nội dung hỗn hợp vào đây hoặc tải file .txt lên.\nHệ thống sẽ tự nhận diện cấu trúc."
        };

        const tips = {
          mc: "Hỗ trợ 'Câu X.' hoặc 'Câu X:'. Đáp án dùng 'A.' hoặc 'A)'. Đáp án đúng có dấu '*' ở đầu.",
          tf: "Tương tự trắc nghiệm, thường dùng 'a)', 'b)'.",
          sa: "Hệ thống sẽ tự hiện bàn phím số trên điện thoại. Đáp án phải để giữa 2 dấu * (VD: *123*).",
          rc: "Dùng 'Câu X.' cho Đoạn văn/Yêu cầu chung. Dùng '#1.', '#2.' cho các câu hỏi con thuộc đoạn văn đó.",
          file: "Bấm nút bên dưới để tải lên file .txt có chứa sẵn cấu trúc chuẩn."
        };

        return (
          <div className="min-h-screen p-4 md:p-8 animate-fade-in bg-slate-100">
            <Notification />
            <div className="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl p-6 md:p-8">
              <div className="flex justify-between items-center mb-6">
                <h1 className="text-2xl font-black text-slate-800">Soạn Thảo Đề Thi</h1>
                <button onClick={() => setScreen('dashboard')} className="text-slate-500 font-bold hover:text-slate-800">Thoát</button>
              </div>

              {/* TABS */}
              <div className="flex flex-wrap gap-2 mb-6 border-b border-slate-200 pb-2">
                {tabs.map(t => (
                  <button key={t.id} onClick={() => setInputTab(t.id)} 
                    className={`px-4 py-2 font-bold rounded-t-xl transition ${inputTab === t.id ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                    {t.label}
                  </button>
                ))}
              </div>

              {/* Hướng dẫn & Nút Upload */}
              <div className="bg-blue-50 p-4 rounded-xl mb-4 border border-blue-100 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <p className="text-sm text-blue-800 font-medium">💡 <b>Hướng dẫn:</b> {tips[inputTab]}</p>
                {inputTab === 'file' && (
                  <label className="cursor-pointer bg-white border-2 border-blue-200 text-blue-600 px-4 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-blue-50 transition shrink-0">
                    <Icons.Upload /> Chọn file .txt
                    <input type="file" accept=".txt" className="hidden" onChange={(e) => {
                      const file = e.target.files[0]; if(!file) return;
                      const reader = new FileReader(); reader.onload = (evt) => setRawTexts({...rawTexts, file: evt.target.result});
                      reader.readAsText(file);
                    }} />
                  </label>
                )}
              </div>

              <textarea 
                className="w-full h-[350px] p-5 border-2 border-slate-200 rounded-2xl focus:border-blue-500 outline-none resize-none font-mono text-sm leading-relaxed bg-slate-50 mb-6" 
                placeholder={placeholders[inputTab]} 
                value={rawTexts[inputTab]} 
                onChange={(e) => setRawTexts({...rawTexts, [inputTab]: e.target.value})}
              />

              <button onClick={handleParse} className="w-full bg-green-600 hover:bg-green-700 text-white font-black text-lg py-4 rounded-2xl shadow-lg transition">LƯU LẠI & TIẾP TỤC</button>
            </div>
          </div>
        );
      }

      // --- MÀN HÌNH SETTINGS (TỔNG QUAN) ---
      if (screen === 'settings') {
        // Prepare sections dynamically
        const sections = [
          { id: 'mc', title: 'Phần I: Trắc Nghiệm', data: parsedData.mc },
          { id: 'tf', title: 'Phần II: Đúng/Sai', data: parsedData.tf },
          { id: 'sa', title: 'Phần III: Trả lời ngắn', data: parsedData.sa },
          { id: 'rc', title: 'Phần IV: Đọc hiểu / Nhóm', data: parsedData.rc }
        ].filter(s => s.data.length > 0);

        return (
          <div className="min-h-screen p-4 md:p-8 animate-fade-in bg-slate-100">
            <Notification />
            <div className="max-w-4xl mx-auto space-y-6">
              
              {/* TOP CARD: ACTIONS */}
              <div className="bg-white rounded-3xl shadow-xl p-6 md:p-8 border border-slate-200">
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                  <h2 className="text-2xl font-black text-slate-800">Tổng Quan Đề Thi</h2>
                  {currentQuizCode && (
                    <div onClick={() => copyToClipboard(currentQuizCode)} className="bg-blue-100 text-blue-800 font-mono font-bold px-4 py-2 rounded-xl flex items-center gap-2 cursor-pointer hover:bg-blue-200 transition shadow-inner">
                      Mã: {currentQuizCode} <Icons.Copy />
                    </div>
                  )}
                </div>

                <div className="grid md:grid-cols-2 gap-6 mb-8 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                  <div>
                    <p className="text-xs font-bold text-slate-500 uppercase mb-2">Chế độ thi</p>
                    <div className="flex gap-2">
                      <button onClick={() => setConfig({...config, mode: 'single'})} className={`flex-1 py-2 rounded-lg font-bold border-2 ${config.mode === 'single' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-200 text-slate-500 bg-white'}`}>Từng câu</button>
                      <button onClick={() => setConfig({...config, mode: 'all'})} className={`flex-1 py-2 rounded-lg font-bold border-2 ${config.mode === 'all' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-200 text-slate-500 bg-white'}`}>Tất cả</button>
                    </div>
                  </div>
                  <div>
                    <p className="text-xs font-bold text-slate-500 uppercase mb-2">Xáo trộn</p>
                    <select value={config.shuffle} onChange={(e) => setConfig({...config, shuffle: e.target.value})} className="w-full py-2.5 px-3 border-2 border-slate-200 rounded-lg font-bold text-slate-700 outline-none">
                      <option value="none">Giữ nguyên</option>
                      <option value="questions">Chỉ trộn câu hỏi</option>
                      <option value="options">Chỉ trộn đáp án</option>
                      <option value="both">Trộn tất cả</option>
                    </select>
                  </div>
                </div>

                <div className="flex flex-col sm:flex-row gap-3">
                  <button onClick={() => setScreen(currentUser ? 'dashboard' : 'home')} className="sm:w-auto w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold px-6 py-3 rounded-xl transition">Thoát</button>
                  {!isReadOnly && <button onClick={() => setScreen('input')} className="sm:w-auto w-full bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold px-6 py-3 rounded-xl transition">Sửa nội dung</button>}
                  {!isReadOnly && <button onClick={saveQuiz} className="sm:w-auto w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-6 py-3 rounded-xl transition shadow flex items-center justify-center gap-2"><Icons.Share /> Lưu & Chia sẻ</button>}
                  <button onClick={prepareQuiz} className="flex-1 bg-green-600 hover:bg-green-700 text-white font-black px-6 py-3 rounded-xl transition shadow flex items-center justify-center gap-2"><Icons.Play /> BẮT ĐẦU THI</button>
                </div>
              </div>

              {/* LIST OF QUESTIONS */}
              <div className="bg-white rounded-3xl shadow-xl p-6 md:p-8 border border-slate-200">
                <h2 className="text-xl font-bold text-slate-800 mb-6">Chi tiết các câu hỏi {!isReadOnly && "(Thêm ảnh)"}</h2>
                {sections.length === 0 ? <div className="text-center text-slate-400 py-10">Đề trống.</div> : sections.map(section => (
                  <div key={section.id} className="mb-10 last:mb-0">
                    <h3 className="font-bold text-lg text-blue-800 bg-blue-50 px-4 py-2 rounded-lg mb-4">{section.title}</h3>
                    <div className="space-y-4">
                      {section.data.map((q, idx) => (
                        <div key={q.id} className="border-2 border-slate-100 rounded-xl p-4 flex flex-col md:flex-row gap-4 bg-white hover:border-blue-200 transition">
                          <div className="flex-1">
                            <div className="font-black text-slate-700 mb-1">Câu {idx + 1}:</div>
                            <div className="text-slate-800 whitespace-pre-wrap font-medium">{q.text}</div>
                            
                            {/* HIỂN THỊ ĐÁP ÁN HOẶC SUB-QUESTIONS TÙY LOẠI */}
                            {!isReadOnly && q.type === 'sa' && <div className="text-sm text-green-700 mt-2 font-bold bg-green-50 p-2 rounded inline-block">Đ.án: {q.options[0].text}</div>}
                            
                            {q.type === 'rc' && (
                              <div className="mt-4 space-y-3 pl-4 border-l-4 border-slate-200">
                                {q.subQuestions.map((sq, sIdx) => (
                                  <div key={sq.id}>
                                    <div className="font-bold text-slate-600">#{sIdx + 1}: {sq.text}</div>
                                    {!isReadOnly && sq.options.filter(o=>o.isCorrect).map(o => <div key={o.id} className="text-sm text-green-600 font-medium">Đ.án: {o.text}</div>)}
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                          
                          {/* NÚT THÊM ẢNH */}
                          <div className="w-full md:w-auto shrink-0 flex items-center justify-center bg-slate-50 p-2 rounded-xl border border-dashed border-slate-300">
                            {q.image ? (
                              <div className="relative inline-block">
                                <img src={q.image} className="h-28 w-auto object-contain rounded" />
                                {!isReadOnly && <button onClick={() => { const newData = {...parsedData}; newData[section.id].find(x => x.id === q.id).image = null; setParsedData(newData); }} className="absolute -top-3 -right-3 bg-red-500 text-white rounded-full w-7 h-7 flex items-center justify-center text-sm font-bold shadow hover:bg-red-600">×</button>}
                              </div>
                            ) : (
                              !isReadOnly ? (
                                <label className="cursor-pointer text-blue-600 hover:text-blue-800 font-bold text-sm py-4 px-6 flex flex-col items-center gap-1 transition">
                                  <Icons.Image /> Thêm ảnh
                                  <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(q.id, section.id, e.target.files[0])} />
                                </label>
                              ) : <span className="text-slate-400 text-sm px-4">Không có ảnh</span>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      // --- MÀN HÌNH LÀM BÀI ---
      if (screen === 'quiz') {
        const totalQ = score.total;
        const isModeSingle = config.mode === 'single';

        const mcLetters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
        const getOptClass = (opt, isSelected, showResult) => {
          if (!showResult) return isSelected ? 'bg-blue-50 border-blue-400' : 'bg-white border-slate-200 hover:border-blue-300';
          if (opt.isCorrect && isSelected) return 'bg-green-100 border-green-500 text-green-800';
          if (opt.isCorrect && !isSelected) return 'bg-white border-green-500 border-dashed text-green-700';
          if (!opt.isCorrect && isSelected) return 'bg-red-100 border-red-500 text-red-800';
          return 'bg-white border-slate-200 opacity-50';
        };

        // Render Options Helper
        const renderOptions = (type, qObj, isConfirming) => {
           if (type === 'sa') {
             return (
               <div className="p-6 bg-slate-50 border border-slate-200 rounded-2xl">
                 <p className="text-xs font-bold text-slate-500 mb-3 uppercase">Nhập đáp án:</p>
                 <ShortAnswerInput value={answers[qObj.id] || ''} onChange={(v) => !isConfirming && setAnswers({...answers, [qObj.id]: v})} readOnly={isConfirming} showResult={isConfirming} isCorrect={isConfirming ? checkQuestionCorrect('sa', qObj, answers[qObj.id]) : null} />
                 {isConfirming && !checkQuestionCorrect('sa', qObj, answers[qObj.id]) && <div className="mt-4 p-2 bg-green-100 text-green-800 font-bold rounded-lg text-sm">Đáp án đúng: {qObj.options[0].text}</div>}
               </div>
             );
           }
           return (
             <div className="grid gap-3">
               {qObj.options.map((opt, oIdx) => {
                 const isRadio = type !== 'tf'; // TF allows multiple? No, TF is usually radio per statement, but old logic allowed multiple. We treat standard TF as radio here, or checkboxes if needed. User requested radio style for MC, check for TF. Let's force Radio for simplicity unless they designed it otherwise.
                 const isSelected = (answers[qObj.id] || []).includes(opt.id);
                 return (
                   <label key={opt.id} className={`flex items-start p-4 border-2 rounded-xl transition cursor-pointer ${getOptClass(opt, isSelected, isConfirming)}`} 
                     onClick={() => {
                       if (isConfirming) return;
                       let newSelected = answers[qObj.id] || [];
                       if (type === 'mc' || type === 'rc') newSelected = [opt.id]; // Radio
                       else newSelected = newSelected.includes(opt.id) ? newSelected.filter(id => id !== opt.id) : [...newSelected, opt.id]; // Checkbox for TF
                       setAnswers({...answers, [qObj.id]: newSelected});
                     }}>
                     <input type={type==='tf'?"checkbox":"radio"} checked={isSelected} readOnly className="mt-1 w-5 h-5 text-blue-600" />
                     <div className="ml-3 font-medium text-lg whitespace-pre-wrap"><span className="font-bold mr-2">{type==='tf' ? String.fromCharCode(97+oIdx)+')' : mcLetters[oIdx]+'.'}</span>{opt.text}</div>
                   </label>
                 )
               })}
             </div>
           );
        }

        // Logic chấm điểm (Single)
        const confirmSingle = () => {
          const q = activeQuiz.flat[currentIndex];
          // Check if all answered
          if (q.type === 'rc') {
            for (let sq of q.subQuestions) {
              if (!answers[sq.id] || answers[sq.id].length === 0) return showMessage('Vui lòng trả lời hết các câu hỏi phụ!');
            }
            let correct = 0;
            q.subQuestions.forEach(sq => { if(checkQuestionCorrect('rc', sq, answers[sq.id])) correct++; });
            setScore(p => ({ ...p, correct: p.correct + correct }));
          } else {
            const ans = answers[q.id];
            if (!ans || (Array.isArray(ans) && ans.length===0) || (typeof ans==='string' && !ans.trim())) return showMessage('Vui lòng chọn đáp án!');
            if (checkQuestionCorrect(q.type, q, ans)) setScore(p => ({ ...p, correct: p.correct + 1 }));
          }
          setSingleQuestionConfirmed(true);
        };

        // Logic chấm điểm (All)
        const submitAll = () => {
          let hasUnanswered = false;
          activeQuiz.flat.forEach(q => {
            if(q.type === 'rc') { q.subQuestions.forEach(sq => { if(!answers[sq.id] || answers[sq.id].length===0) hasUnanswered = true; }) }
            else { const ans = answers[q.id]; if(!ans || (Array.isArray(ans)&&ans.length===0) || (typeof ans==='string'&&!ans.trim())) hasUnanswered = true; }
          });
          if (hasUnanswered) return showMessage('Bạn còn câu chưa làm!');

          let correct = 0;
          activeQuiz.flat.forEach(q => {
            if(q.type === 'rc') { q.subQuestions.forEach(sq => { if(checkQuestionCorrect('rc', sq, answers[sq.id])) correct++; }) }
            else { if(checkQuestionCorrect(q.type, q, answers[q.id])) correct++; }
          });
          setScore({ correct, total: totalQ });
          setIsSubmitted(true);
          window.scrollTo(0,0);
        };

        return (
          <div className="min-h-screen bg-slate-100 pb-20 animate-fade-in">
            <Notification />
            {/* Header Màn hình làm bài */}
            <div className="sticky top-0 z-50 bg-white/90 backdrop-blur shadow-sm border-b border-slate-200 p-4">
              <div className="max-w-4xl mx-auto flex items-center justify-between">
                <div className="font-bold text-slate-700 bg-slate-100 px-4 py-2 rounded-lg border border-slate-200">
                  {isModeSingle ? ( <>Khối câu: <span className="text-blue-600">{currentIndex + 1}</span> / {activeQuiz.flat.length}</> ) 
                  : ( <>Tiến trình làm bài</> )}
                </div>
                <button onClick={() => setScreen(currentUser ? 'dashboard' : 'home')} className="font-bold text-red-500 hover:text-red-700 bg-red-50 px-4 py-2 rounded-lg transition">Thoát</button>
              </div>
            </div>

            <div className="max-w-3xl mx-auto mt-8 px-4">
              {/* SINGLE MODE */}
              {isModeSingle && (() => {
                const q = activeQuiz.flat[currentIndex];
                return (
                  <div className="bg-white rounded-3xl shadow-xl p-6 md:p-10 animate-fade-in">
                    <span className="bg-indigo-100 text-indigo-800 text-xs font-black px-3 py-1 rounded-full uppercase mb-4 inline-block">
                      {q.type === 'mc' ? 'Trắc Nghiệm' : q.type === 'tf' ? 'Đúng Sai' : q.type === 'sa' ? 'Trả Lời Ngắn' : 'Đọc Hiểu / Nhóm'}
                    </span>
                    <div className="text-xl font-medium text-slate-800 mb-6 whitespace-pre-wrap"><span className="font-black mr-1">Nội dung:</span> {q.text}</div>
                    {q.image && <img src={q.image} className="max-w-full rounded-xl mb-6 shadow" />}

                    {q.type !== 'rc' ? renderOptions(q.type, q, singleQuestionConfirmed) : (
                      <div className="space-y-6">
                        {q.subQuestions.map((sq, idx) => (
                          <div key={sq.id} className="p-5 bg-slate-50 border border-slate-200 rounded-2xl">
                            <p className="font-bold text-slate-800 mb-4">#{idx+1}: {sq.text}</p>
                            {renderOptions('rc', sq, singleQuestionConfirmed)}
                          </div>
                        ))}
                      </div>
                    )}

                    <div className="flex justify-end pt-6 mt-6 border-t border-slate-100">
                      {!singleQuestionConfirmed ? (
                        <button onClick={confirmSingle} className="bg-blue-600 hover:bg-blue-700 text-white font-black py-3.5 px-8 rounded-xl shadow-lg w-full md:w-auto transition transform hover:-translate-y-1">XÁC NHẬN</button>
                      ) : (
                        <button onClick={() => currentIndex < activeQuiz.flat.length - 1 ? (setCurrentIndex(p=>p+1), setSingleQuestionConfirmed(false)) : setScreen('result')} className="bg-green-600 hover:bg-green-700 text-white font-black py-3.5 px-8 rounded-xl shadow-lg w-full md:w-auto flex items-center justify-center gap-2 transition">
                          {currentIndex < activeQuiz.flat.length - 1 ? 'CÂU TIẾP THEO' : 'XEM KẾT QUẢ'} <Icons.Check />
                        </button>
                      )}
                    </div>
                  </div>
                )
              })()}

              {/* ALL MODE */}
              {!isModeSingle && (
                <div className="space-y-8">
                  {isSubmitted && (
                    <div className="bg-white rounded-3xl shadow-2xl border-4 border-green-500 p-8 text-center animate-fade-in relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-full bg-green-500 text-white font-bold py-1 text-sm uppercase">Hoàn thành xuất sắc</div>
                      <h2 className="text-3xl font-black text-slate-800 mt-4 mb-2">ĐIỂM CỦA BẠN</h2>
                      <div className="text-7xl font-black text-green-600 mb-6 drop-shadow-md">{score.correct} <span className="text-4xl text-slate-300">/ {totalQ}</span></div>
                      <button onClick={() => setScreen(currentUser ? 'dashboard' : 'home')} className="bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-8 rounded-xl transition shadow">Quay về Màn hình chính</button>
                    </div>
                  )}

                  {['mc', 'tf', 'sa', 'rc'].map(type => {
                    const data = activeQuiz[type]; if(data.length === 0) return null;
                    const typeName = type === 'mc' ? 'I. Trắc Nghiệm' : type === 'tf' ? 'II. Đúng / Sai' : type === 'sa' ? 'III. Trả Lời Ngắn' : 'IV. Đọc Hiểu';
                    
                    return (
                      <div key={type} className="bg-white rounded-3xl shadow-lg overflow-hidden border border-slate-200">
                        <div className="bg-indigo-600 p-4"><h2 className="text-xl font-black text-white">{typeName}</h2></div>
                        <div className="p-6 md:p-8 space-y-10">
                          {data.map((q, idx) => (
                            <div key={q.id} className="border-b-2 border-dashed border-slate-100 pb-10 last:border-0 last:pb-0">
                              <h3 className="text-lg font-medium text-slate-800 mb-4 whitespace-pre-wrap"><span className="font-black mr-2 text-indigo-600">Câu {idx + 1}.</span> {q.text}</h3>
                              {q.image && <img src={q.image} className="max-w-full rounded-xl mb-6 shadow border" />}
                              
                              {type !== 'rc' ? renderOptions(type, q, isSubmitted) : (
                                <div className="space-y-6">
                                  {q.subQuestions.map((sq, sIdx) => (
                                    <div key={sq.id} className="p-5 bg-slate-50 border border-slate-200 rounded-2xl">
                                      <p className="font-bold text-slate-800 mb-4">#{sIdx+1}: {sq.text}</p>
                                      {renderOptions('rc', sq, isSubmitted)}
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    )
                  })}
                  {!isSubmitted && <button onClick={submitAll} className="w-full bg-green-600 hover:bg-green-700 text-white text-2xl font-black py-5 rounded-2xl shadow-xl transition transform hover:-translate-y-1 mb-10">NỘP BÀI</button>}
                </div>
              )}
            </div>
          </div>
        );
      }

      if (screen === 'result') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100 animate-fade-in">
            <div className="bg-white rounded-3xl shadow-2xl p-10 max-w-sm w-full text-center border-t-8 border-green-500">
              <div className="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><Icons.Check /></div>
              <h1 className="text-4xl font-black text-slate-800 mb-2">Tốt Lắm!</h1>
              <div className="bg-slate-50 rounded-2xl p-6 mb-8 border border-slate-200 mt-6 shadow-inner">
                <p className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">ĐIỂM CỦA BẠN</p>
                <div className="text-7xl font-black text-blue-600 drop-shadow-sm">{score.correct} <span className="text-3xl text-slate-300">/ {score.total}</span></div>
              </div>
              <div className="space-y-3">
                <button onClick={prepareQuiz} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-md transition">Làm lại bài này</button>
                <button onClick={() => setScreen(currentUser ? 'dashboard' : 'home')} className="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-4 rounded-xl transition">Thoát ra ngoài</button>
              </div>
            </div>
          </div>
        );
      }
      return null;
    }

    function RootApp() {
      if (isSetupNeeded) return <SetupScreen />;
      return <MainApp />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RootApp />);
  </script>
</body>
</html>
