<!DOCTYPE html>
<html lang="vi" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo Trắc Nghiệm</title>
  
  <!-- Tải React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Tải Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tải Tailwind CSS & Cấu hình Dark Mode -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class', // Kích hoạt dark mode qua class 'dark'
    }
  </script>
  
  <!-- Tải Firebase Compat -->
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
  
  <style>
    body { -webkit-font-smoothing: antialiased; }
    .animate-fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    textarea::-webkit-scrollbar { width: 8px; }
    textarea::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
    .dark textarea::-webkit-scrollbar-thumb { background-color: #475569; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // NƠI ĐIỀN CẤU HÌNH FIREBASE CỦA HUY
    const MY_FIREBASE_CONFIG = {
  apiKey: "AIzaSyBPYnBhPME-BTST63QDyP0gUho07G9QyQc",
  authDomain: "tracnghiem-31c44.firebaseapp.com",
  projectId: "tracnghiem-31c44",
  storageBucket: "tracnghiem-31c44.firebasestorage.app",
  messagingSenderId: "742429088050",
  appId: "1:742429088050:web:9ff00733cc280a1e49df2b",
  measurementId: "G-VNXTHZV6ZH"
};

    // GIỚI HẠN LƯU ĐỀ CHO NGƯỜI DÙNG THƯỜNG
    const MAX_QUIZZES_PER_USER = 5;
    const ADMIN_USERNAME = "huy20022k8";

    // --- KHỞI TẠO HỆ THỐNG ---
    let finalConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : MY_FIREBASE_CONFIG;
    let auth = null;
    let db = null;
    let isSetupNeeded = false;
    let appId = typeof __app_id !== 'undefined' ? __app_id : 'quiz-app-huy-github';

    if (!finalConfig || !finalConfig.apiKey) {
      isSetupNeeded = true;
    } else {
      try {
        if (!firebase.apps.length) firebase.initializeApp(finalConfig);
        auth = firebase.auth();
        db = firebase.firestore();
      } catch(e) {
        console.error("Lỗi khởi tạo Firebase:", e);
        isSetupNeeded = true;
      }
    }

    const quizzesPath = `artifacts/${appId}/public/data/quizzes`;
    const usersPath = `artifacts/${appId}/public/data/users`;

    // --- TIỆN ÍCH ---
    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    const generateShareCode = () => {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let result = '';
      for (let i = 0; i < 6; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
      return result;
    };

    const generateId = () => Math.random().toString(36).substr(2, 9);

    // --- ICONS ---
    const Icons = {
      Upload: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>,
      Image: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
      Check: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
      Logout: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>,
      Share: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg>,
      Play: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      Copy: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>,
      Trash: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
      User: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
      Sun: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
      Moon: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
    };

    // --- COMPONENT TRẢ LỜI NGẮN ---
    const ShortAnswerInput = ({ value = '', onChange, readOnly, isCorrect, showResult }) => {
      const chars = (value || '').split('');
      const boxes = [0, 1, 2, 3];
      
      let borderColorClass = 'border-slate-300 dark:border-slate-600';
      let bgColorClass = 'bg-white dark:bg-slate-800';
      let textColorClass = 'text-slate-800 dark:text-slate-100';

      if (showResult) {
        borderColorClass = isCorrect ? 'border-green-500' : 'border-red-500';
        bgColorClass = isCorrect ? 'bg-green-50 dark:bg-green-900/30' : 'bg-red-50 dark:bg-red-900/30';
        textColorClass = isCorrect ? 'text-green-700 dark:text-green-400' : 'text-red-700 dark:text-red-400';
      } else if (value) {
        borderColorClass = 'border-blue-500';
        bgColorClass = 'bg-blue-50 dark:bg-blue-900/30';
      }

      return (
        <div className="relative inline-flex gap-2 group">
          {boxes.map(i => (
            <div key={i} className={`w-12 h-14 flex items-center justify-center text-2xl font-bold border-2 rounded-xl transition-colors duration-200 ${borderColorClass} ${bgColorClass} ${textColorClass} shadow-sm group-hover:border-blue-400`}>
              {chars[i] || ''}
            </div>
          ))}
          <input type="text" inputMode="decimal" pattern="[0-9\.\,\-]*" className="absolute inset-0 w-full h-full opacity-0 cursor-text z-10" value={value}
            onChange={(e) => {
              const filteredValue = e.target.value.replace(/[^0-9\.\,\-]/g, '').slice(0, 4);
              onChange(filteredValue);
            }} readOnly={readOnly} autoComplete="off" />
        </div>
      );
    };

    // ================= APP CHÍNH =================
    function MainApp() {
      const [fbUser, setFbUser] = useState(null);
      const [currentUser, setCurrentUser] = useState(null); 
      
      const [screen, setScreen] = useState('home'); 
      const [allQuizzes, setAllQuizzes] = useState([]);
      const [globalMessage, setGlobalMessage] = useState({ text: '', type: 'error' });
      const [confirmDeleteId, setConfirmDeleteId] = useState(null);

      // Theme State (Dark/Light Mode)
      const [theme, setTheme] = useState(localStorage.getItem('quiz_theme') || 'light');

      // Input State
      const [inputTab, setInputTab] = useState('mc'); 
      const [rawTexts, setRawTexts] = useState({ mc: '', tf: '', sa: '', rc: '', file: '' });

      // Quiz State
      const [isReadOnly, setIsReadOnly] = useState(false);
      const [currentQuizCode, setCurrentQuizCode] = useState(null);
      const [parsedData, setParsedData] = useState({ mc: [], tf: [], sa: [], rc: [] });
      const [config, setConfig] = useState({ mode: 'single', shuffle: 'none' });
      
      // Gameplay State
      const [activeQuiz, setActiveQuiz] = useState({ mc: [], tf: [], sa: [], rc: [], flat: [] });
      const [answers, setAnswers] = useState({}); 
      const [currentIndex, setCurrentIndex] = useState(0); 
      const [isSubmitted, setIsSubmitted] = useState(false); 
      const [singleQuestionConfirmed, setSingleQuestionConfirmed] = useState(false); 
      const [score, setScore] = useState({ correct: 0, total: 0 });

      // --- EFFECT: Xử lý Giao diện Tối/Sáng ---
      useEffect(() => {
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        localStorage.setItem('quiz_theme', theme);
      }, [theme]);

      const toggleTheme = () => setTheme(theme === 'light' ? 'dark' : 'light');

      // --- Các hàm tiện ích khác ---
      const showMessage = (text, type = 'error') => {
        setGlobalMessage({ text, type });
        setTimeout(() => setGlobalMessage({ text: '', type: 'error' }), 3500);
      };

      const copyToClipboard = async (text) => {
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
            showMessage("Đã copy mã: " + text, "success");
            return;
          }
        } catch (err) {}
        const textArea = document.createElement("textarea");
        textArea.value = text; textArea.style.position = "fixed"; textArea.style.opacity = "0";
        document.body.appendChild(textArea); textArea.focus(); textArea.select();
        try { document.execCommand('copy'); showMessage("Đã copy mã: " + text, "success"); } 
        catch (err) { showMessage("Bôi đen để copy mã nhé.", "error"); }
        document.body.removeChild(textArea);
      };

      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try { await auth.signInAnonymously(); } catch (error) { console.error(error); }
        };
        initAuth();
        const unsub = auth.onAuthStateChanged((u) => setFbUser(u));
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!fbUser || !db) return;
        const unsub = db.collection(quizzesPath).onSnapshot((snap) => {
          const list = [];
          snap.forEach(docSnap => {
             const data = docSnap.data();
             const currentExpires = data.expiresAt || (data.createdAt + 30 * 24 * 60 * 60 * 1000);
             list.push({ id: docSnap.id, ...data, expiresAt: currentExpires });
          });
          setAllQuizzes(list);
        }, (err) => console.error(err));
        return () => unsub();
      }, [fbUser]);

      useEffect(() => {
        if (!currentUser || !db) return;
        const now = Date.now();
        allQuizzes.forEach(q => {
          if (q.expiresAt < now && q.owner === currentUser.username.toLowerCase()) {
            db.doc(`${quizzesPath}/${q.id}`).delete().catch(e => {});
          }
        });
      }, [allQuizzes, currentUser]);

      // --- LOGIN / GUEST ---
      const handleLogin = async (e) => {
        e.preventDefault();
        const uname = e.target.username.value.trim();
        const pwd = e.target.password.value;
        if (!uname || !pwd) return showMessage("Vui lòng nhập đủ thông tin.");

        const userRef = db.doc(`${usersPath}/${uname.toLowerCase()}`);
        try {
          const userSnap = await userRef.get();
          if (userSnap.exists) {
            if (userSnap.data().password === pwd) {
              setCurrentUser({ username: userSnap.data().username });
              setScreen('dashboard');
            } else showMessage("Sai mật khẩu!");
          } else {
            await userRef.set({ username: uname, password: pwd });
            setCurrentUser({ username: uname });
            setScreen('dashboard');
            showMessage("Tạo tài khoản thành công!", "success");
          }
        } catch (error) { showMessage("Lỗi kết nối mạng."); }
      };

      const handleGuestJoin = async (e) => {
        e.preventDefault();
        const code = e.target.shareCode.value.trim().toUpperCase();
        if (code.length !== 6) return showMessage("Mã đề gồm 6 ký tự.");

        const qDoc = allQuizzes.find(q => q.code === code && q.expiresAt > Date.now());
        if (qDoc) {
          const safeParsed = { mc: [], tf: [], sa: [], rc: [], ...qDoc.parsedData };
          setParsedData(safeParsed);
          setIsReadOnly(true);
          setCurrentQuizCode(code);
          setScreen('settings');
        } else {
          showMessage("Mã không đúng hoặc đề đã hết hạn!");
        }
      };

      // --- PARSING ENGINE ---
      const parseTextEngine = (text, forcedType) => {
        let result = [];
        let currentQ = null;
        let currentSubQ = null;

        const lines = text.split('\n');
        for (let rawLine of lines) {
          let line = rawLine.replace(/[\u200B\u200C\u200D\uFEFF]/g, '').trim();
          if (!line) continue;

          const qMatch = line.match(/^[Cc][âa]u\s*\d+[\.\:\)]\s*(.*)/);
          if (qMatch) {
            if (currentQ) result.push(currentQ);
            currentQ = { id: generateId(), text: qMatch[1] || "", type: forcedType !== 'mixed' ? forcedType : null, options: [], subQuestions: [], image: null };
            currentSubQ = null;
            continue;
          }

          const subQMatch = line.match(/^#\d+[\.\:\)]\s*(.*)/);
          if (subQMatch && currentQ) {
            currentQ.type = 'rc';
            currentSubQ = { id: generateId(), text: subQMatch[1] || "", options: [] };
            currentQ.subQuestions.push(currentSubQ);
            continue;
          }

          const optMatch = line.match(/^(\*?)\s*([A-Za-zĐđ])[\.\)]\s*(.*)/);
          if (optMatch) {
            const optObj = { id: generateId(), text: optMatch[3], isCorrect: optMatch[1] === '*' };
            if (currentSubQ) {
              currentSubQ.options.push(optObj);
            } else if (currentQ) {
              currentQ.options.push(optObj);
              if (!currentQ.type) currentQ.type = 'mc'; 
            }
            continue;
          }

          const saMatch = line.match(/^\*\s*(.+?)\s*\*$/);
          if (saMatch && currentQ && !currentSubQ && currentQ.options.length === 0) {
            currentQ.type = 'sa';
            currentQ.options.push({ id: generateId(), text: saMatch[1], isCorrect: true });
            continue;
          }

          if (currentSubQ) {
            if (currentSubQ.options.length === 0) currentSubQ.text += '\n' + line;
            else currentSubQ.options[currentSubQ.options.length - 1].text += '\n' + line;
          } else if (currentQ) {
            if (currentQ.options.length === 0) currentQ.text += '\n' + line;
            else currentQ.options[currentQ.options.length - 1].text += '\n' + line;
          }
        }
        if (currentQ) result.push(currentQ);
        return result;
      };

      const handleParse = () => {
        let allMC = [], allTF = [], allSA = [], allRC = [];

        allMC.push(...parseTextEngine(rawTexts.mc, 'mc'));
        allTF.push(...parseTextEngine(rawTexts.tf, 'tf'));
        allSA.push(...parseTextEngine(rawTexts.sa, 'sa'));
        allRC.push(...parseTextEngine(rawTexts.rc, 'rc'));

        const mixedItems = parseTextEngine(rawTexts.file, 'mixed');
        mixedItems.forEach(item => {
          if (item.type === 'mc') allMC.push(item);
          else if (item.type === 'tf') allTF.push(item);
          else if (item.type === 'sa') allSA.push(item);
          else if (item.type === 'rc') allRC.push(item);
        });

        if (allMC.length === 0 && allTF.length === 0 && allSA.length === 0 && allRC.length === 0) {
          return showMessage('Không tìm thấy câu hỏi đúng định dạng ở bất kỳ phần nào!');
        }

        setParsedData({ mc: allMC, tf: allTF, sa: allSA, rc: allRC });
        setScreen('settings');
      };

      // --- LƯU / QUẢN LÝ ---
      const saveQuiz = async () => {
        if (!fbUser || !currentUser || !db) return;
        
        // CHECK GIỚI HẠN LƯU TRỮ
        const usernameLower = currentUser.username.toLowerCase();
        const isAdmin = usernameLower === ADMIN_USERNAME;
        
        if (!isAdmin) {
          const userQuizzesCount = allQuizzes.filter(q => q.owner === usernameLower).length;
          if (userQuizzesCount >= MAX_QUIZZES_PER_USER) {
            return showMessage(`Tài khoản thường chỉ được lưu tối đa ${MAX_QUIZZES_PER_USER} đề. Vui lòng xóa bớt đề cũ!`, "error");
          }
        }

        const dataStr = JSON.stringify(parsedData);
        if (dataStr.length > 900000) return showMessage("Đề có chứa ảnh quá lớn!");

        const code = generateShareCode();
        let titleLine = "Đề thi không tên";
        const allText = Object.values(rawTexts).join('\n');
        const firstLine = allText.split('\n').find(l => l.trim().length > 0);
        if(firstLine) titleLine = firstLine.length > 50 ? firstLine.substring(0, 50) + "..." : firstLine;

        const docRef = db.doc(`${quizzesPath}/${code}`);
        const now = Date.now();
        const expiresAt = now + 30 * 24 * 60 * 60 * 1000;

        try {
          await docRef.set({ code, owner: usernameLower, title: titleLine, parsedData, rawTexts, createdAt: now, expiresAt });
          setCurrentQuizCode(code);
          copyToClipboard(code); 
        } catch (error) { showMessage("Lỗi khi lưu đề!"); }
      };

      const handleDeleteQuiz = async (quizId) => {
        try { await db.doc(`${quizzesPath}/${quizId}`).delete(); setConfirmDeleteId(null); } catch (e) {}
      };
      const handleExtendQuiz = async (q) => {
        const max = q.createdAt + 50 * 24 * 60 * 60 * 1000; 
        let newEx = q.expiresAt + 7 * 24 * 60 * 60 * 1000;
        if (newEx > max) newEx = max;
        try { await db.doc(`${quizzesPath}/${q.id}`).update({ expiresAt: newEx }); showMessage("Đã gia hạn!", "success"); } catch (e) {}
      };

      // --- LOGIC LÀM ĐỀ ---
      const prepareQuiz = () => {
        let finalMc = [...parsedData.mc], finalTf = [...parsedData.tf], finalSa = [...parsedData.sa], finalRc = [...(parsedData.rc || [])];
        const shuffleOpts = config.shuffle === 'options' || config.shuffle === 'both';
        const shuffleQ = config.shuffle === 'questions' || config.shuffle === 'both';

        if (shuffleQ) {
          finalMc = shuffleArray(finalMc); finalTf = shuffleArray(finalTf); finalSa = shuffleArray(finalSa); finalRc = shuffleArray(finalRc);
        }
        if (shuffleOpts) {
          finalMc.forEach(q => { q.options = shuffleArray(q.options); });
          finalTf.forEach(q => { q.options = shuffleArray(q.options); });
          finalRc.forEach(q => { q.subQuestions.forEach(sq => { sq.options = shuffleArray(sq.options); }) });
        }

        setActiveQuiz({ mc: finalMc, tf: finalTf, sa: finalSa, rc: finalRc, flat: [...finalMc, ...finalTf, ...finalSa, ...finalRc] });
        setAnswers({}); setCurrentIndex(0); setIsSubmitted(false); setSingleQuestionConfirmed(false);
        
        let rcQCount = finalRc.reduce((acc, q) => acc + q.subQuestions.length, 0);
        setScore({ correct: 0, total: finalMc.length + finalTf.length + finalSa.length + rcQCount });
        setScreen('quiz');
      };

      const checkQuestionCorrect = (type, qObj, userAns) => {
        if (type === 'mc' || type === 'rc') {
          const correctIds = qObj.options.filter(o => o.isCorrect).map(o => o.id);
          return Array.isArray(userAns) && userAns.length > 0 && correctIds.includes(userAns[0]);
        } else if (type === 'tf') {
          const correctIds = qObj.options.filter(o => o.isCorrect).map(o => o.id);
          return Array.isArray(userAns) && userAns.length === correctIds.length && userAns.every(id => correctIds.includes(id));
        } else if (type === 'sa') {
          if (typeof userAns !== 'string' || !userAns.trim()) return false;
          const cleanUser = userAns.trim().replace(',', '.');
          const cleanCorrect = qObj.options[0].text.trim().replace(',', '.');
          if (!isNaN(parseFloat(cleanUser)) && !isNaN(parseFloat(cleanCorrect))) return parseFloat(cleanUser) === parseFloat(cleanCorrect);

                            )}
                          </div>
                          
                          <div className="w-full md:w-auto shrink-0 flex items-center justify-center bg-slate-50 dark:bg-slate-900 p-2 rounded-xl border border-dashed border-slate-300 dark:border-slate-600">
                            {q.image ? (
                              <div className="relative inline-block">
                                <img src={q.image} className="h-28 w-auto object-contain rounded" />
                                {!isReadOnly && <button onClick={() => { const newData = {...parsedData}; newData[section.id].find(x => x.id === q.id).image = null; setParsedData(newData); }} className="absolute -top-3 -right-3 bg-red-500 text-white rounded-full w-7 h-7 flex items-center justify-center text-sm font-bold shadow hover:bg-red-600">×</button>}
                              </div>
                            ) : (
                              !isReadOnly ? (
                                <label className="cursor-pointer text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 font-bold text-sm py-4 px-6 flex flex-col items-center gap-1 transition">
                                  <Icons.Image /> Thêm ảnh
                                  <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(q.id, section.id, e.target.files[0])} />
                                </label>
                              ) : <span className="text-slate-400 text-sm px-4">Không có ảnh</span>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      // --- MÀN HÌNH LÀM BÀI ---
      if (screen === 'quiz') {
        const totalQ = score.total;
        const isModeSingle = config.mode === 'single';

        const mcLetters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
        const getOptClass = (opt, isSelected, showResult) => {
          if (!showResult) return isSelected ? 'bg-blue-50 dark:bg-blue-900/30 border-blue-400 dark:border-blue-500 text-blue-800 dark:text-blue-200' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 hover:border-blue-300 dark:hover:border-blue-500 text-slate-800 dark:text-slate-200';
          if (opt.isCorrect && isSelected) return 'bg-green-100 dark:bg-green-900/40 border-green-500 text-green-800 dark:text-green-300';
          if (opt.isCorrect && !isSelected) return 'bg-white dark:bg-slate-800 border-green-500 border-dashed text-green-700 dark:text-green-400';
          if (!opt.isCorrect && isSelected) return 'bg-red-100 dark:bg-red-900/40 border-red-500 text-red-800 dark:text-red-300';
          return 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 opacity-50 text-slate-800 dark:text-slate-200';
        };

        const renderOptions = (type, qObj, isConfirming) => {
           if (type === 'sa') {
             return (
               <div className="p-6 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl transition-colors">
                 <p className="text-xs font-bold text-slate-500 dark:text-slate-400 mb-3 uppercase">Nhập đáp án:</p>
                 <ShortAnswerInput value={answers[qObj.id] || ''} onChange={(v) => !isConfirming && setAnswers({...answers, [qObj.id]: v})} readOnly={isConfirming} showResult={isConfirming} isCorrect={isConfirming ? checkQuestionCorrect('sa', qObj, answers[qObj.id]) : null} />
                 {isConfirming && !checkQuestionCorrect('sa', qObj, answers[qObj.id]) && <div className="mt-4 p-2 bg-green-100 dark:bg-green-900/40 text-green-800 dark:text-green-300 font-bold rounded-lg text-sm border border-green-200 dark:border-green-800">Đáp án đúng: {qObj.options[0].text}</div>}
               </div>
             );
           }
           return (
             <div className="grid gap-3">
               {qObj.options.map((opt, oIdx) => {
                 const isRadio = type !== 'tf'; 
                 const isSelected = (answers[qObj.id] || []).includes(opt.id);
                 return (
                   <label key={opt.id} className={`flex items-start p-4 border-2 rounded-xl transition cursor-pointer ${getOptClass(opt, isSelected, isConfirming)}`} 
                     onClick={() => {
                       if (isConfirming) return;
                       let newSelected = answers[qObj.id] || [];
                       if (type === 'mc' || type === 'rc') newSelected = [opt.id]; 
                       else newSelected = newSelected.includes(opt.id) ? newSelected.filter(id => id !== opt.id) : [...newSelected, opt.id]; 
                       setAnswers({...answers, [qObj.id]: newSelected});
                     }}>
                     <input type={type==='tf'?"checkbox":"radio"} checked={isSelected} readOnly className={`mt-1 w-5 h-5 ${type==='tf'?'rounded text-indigo-600':'text-blue-600'}`} />
                     <div className="ml-3 font-medium text-lg whitespace-pre-wrap"><span className="font-bold mr-2">{type==='tf' ? String.fromCharCode(97+oIdx)+')' : mcLetters[oIdx]+'.'}</span>{opt.text}</div>
                   </label>
                 )
               })}
             </div>
           );
        }

        const confirmSingle = () => {
          const q = activeQuiz.flat[currentIndex];
          if (q.type === 'rc') {
            for (let sq of q.subQuestions) {
              if (!answers[sq.id] || answers[sq.id].length === 0) return showMessage('Vui lòng trả lời hết các câu hỏi phụ!');
            }
            let correct = 0;
            q.subQuestions.forEach(sq => { if(checkQuestionCorrect('rc', sq, answers[sq.id])) correct++; });
            setScore(p => ({ ...p, correct: p.correct + correct }));
          } else {
            const ans = answers[q.id];
            if (!ans || (Array.isArray(ans) && ans.length===0) || (typeof ans==='string' && !ans.trim())) return showMessage('Vui lòng chọn đáp án!');
            if (checkQuestionCorrect(q.type, q, ans)) setScore(p => ({ ...p, correct: p.correct + 1 }));
          }
          setSingleQuestionConfirmed(true);
        };

        const submitAll = () => {
          let hasUnanswered = false;
          activeQuiz.flat.forEach(q => {
            if(q.type === 'rc') { q.subQuestions.forEach(sq => { if(!answers[sq.id] || answers[sq.id].length===0) hasUnanswered = true; }) }
            else { const ans = answers[q.id]; if(!ans || (Array.isArray(ans)&&ans.length===0) || (typeof ans==='string'&&!ans.trim())) hasUnanswered = true; }
          });
          if (hasUnanswered) return showMessage('Bạn còn câu chưa làm!');

          let correct = 0;
          activeQuiz.flat.forEach(q => {
            if(q.type === 'rc') { q.subQuestions.forEach(sq => { if(checkQuestionCorrect('rc', sq, answers[sq.id])) correct++; }) }
            else { if(checkQuestionCorrect(q.type, q, answers[q.id])) correct++; }
          });
          setScore({ correct, total: totalQ });
          setIsSubmitted(true);
          window.scrollTo(0,0);
        };

        return (
          <div className="min-h-screen bg-slate-100 dark:bg-slate-900 pb-20 animate-fade-in transition-colors">
            <Notification />
            <div className="sticky top-0 z-50 bg-white/90 dark:bg-slate-800/90 backdrop-blur shadow-sm border-b border-slate-200 dark:border-slate-700 p-4 transition-colors">
              <div className="max-w-4xl mx-auto flex items-center justify-between">
                <div className="font-bold text-slate-700 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-600 transition-colors">
                  {isModeSingle ? ( <>Khối câu: <span className="text-blue-600 dark:text-blue-400">{currentIndex + 1}</span> / {activeQuiz.flat.length}</> ) 
                  : ( <>Tiến trình làm bài</> )}
                </div>
                <div className="flex items-center gap-3">
                  <ThemeToggleBtn />
                  <button onClick={() => setScreen(currentUser ? 'dashboard' : 'home')} className="font-bold text-red-500 dark:text-red-400 hover:text-red-700 bg-red-50 dark:bg-red-900/30 px-4 py-2 rounded-lg transition-colors border border-red-100 dark:border-red-800/50">Thoát</button>
                </div>
              </div>
            </div>

            <div className="max-w-3xl mx-auto mt-8 px-4">
              {isModeSingle && (() => {
                const q = activeQuiz.flat[currentIndex];
                return (
                  <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-6 md:p-10 animate-fade-in transition-colors border border-slate-200 dark:border-slate-700">
                    <span className="bg-indigo-100 dark:bg-indigo-900/40 text-indigo-800 dark:text-indigo-300 text-xs font-black px-3 py-1 rounded-full uppercase mb-4 inline-block border border-indigo-200 dark:border-indigo-800">
                      {q.type === 'mc' ? 'Trắc Nghiệm' : q.type === 'tf' ? 'Đúng Sai' : q.type === 'sa' ? 'Trả Lời Ngắn' : 'Đọc Hiểu / Nhóm'}
                    </span>
                    <div className="text-xl font-medium text-slate-800 dark:text-white mb-6 whitespace-pre-wrap"><span className="font-black mr-1">Nội dung:</span> {q.text}</div>
                    {q.image && <img src={q.image} className="max-w-full rounded-xl mb-6 shadow" />}

                    {q.type !== 'rc' ? renderOptions(q.type, q, singleQuestionConfirmed) : (
                      <div className="space-y-6">
                        {q.subQuestions.map((sq, idx) => (
                          <div key={sq.id} className="p-5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl transition-colors">
                            <p className="font-bold text-slate-800 dark:text-slate-200 mb-4">#{idx+1}: {sq.text}</p>
                            {renderOptions('rc', sq, singleQuestionConfirmed)}
                          </div>
                        ))}
                      </div>
                    )}

                    <div className="flex justify-end pt-6 mt-6 border-t border-slate-100 dark:border-slate-700">
                      {!singleQuestionConfirmed ? (
                        <button onClick={confirmSingle} className="bg-blue-600 hover:bg-blue-700 text-white font-black py-3.5 px-8 rounded-xl shadow-lg w-full md:w-auto transition transform hover:-translate-y-1">XÁC NHẬN</button>
                      ) : (
                        <button onClick={() => currentIndex < activeQuiz.flat.length - 1 ? (setCurrentIndex(p=>p+1), setSingleQuestionConfirmed(false)) : setScreen('result')} className="bg-green-600 hover:bg-green-700 text-white font-black py-3.5 px-8 rounded-xl shadow-lg w-full md:w-auto flex items-center justify-center gap-2 transition">
                          {currentIndex < activeQuiz.flat.length - 1 ? 'CÂU TIẾP THEO' : 'XEM KẾT QUẢ'} <Icons.Check />
                        </button>
                      )}
                    </div>
                  </div>
                )
              })()}

              {!isModeSingle && (
                <div className="space-y-8">
                  {isSubmitted && (
                    <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl border-4 border-green-500 p-8 text-center animate-fade-in relative overflow-hidden transition-colors">
                      <div className="absolute top-0 left-0 w-full bg-green-500 text-white font-bold py-1 text-sm uppercase">Hoàn thành xuất sắc</div>
                      <h2 className="text-3xl font-black text-slate-800 dark:text-white mt-4 mb-2">ĐIỂM CỦA BẠN</h2>
                      <div className="text-7xl font-black text-green-600 dark:text-green-400 mb-6 drop-shadow-md">{score.correct} <span className="text-4xl text-slate-300 dark:text-slate-600">/ {totalQ}</span></div>
                      <button onClick={() => setScreen(currentUser ? 'dashboard' : 'home')} className="bg-slate-800 dark:bg-slate-700 hover:bg-slate-900 dark:hover:bg-slate-600 text-white font-bold py-3 px-8 rounded-xl transition shadow">Quay về Màn hình chính</button>
                    </div>
                  )}

                  {['mc', 'tf', 'sa', 'rc'].map(type => {
                    const data = activeQuiz[type]; if(data.length === 0) return null;
                    const typeName = type === 'mc' ? 'I. Trắc Nghiệm' : type === 'tf' ? 'II. Đúng / Sai' : type === 'sa' ? 'III. Trả Lời Ngắn' : 'IV. Đọc Hiểu';
                    
                    return (
                      <div key={type} className="bg-white dark:bg-slate-800 rounded-3xl shadow-lg overflow-hidden border border-slate-200 dark:border-slate-700 transition-colors">
                        <div className="bg-indigo-600 dark:bg-indigo-700 p-4"><h2 className="text-xl font-black text-white">{typeName}</h2></div>
                        <div className="p-6 md:p-8 space-y-10">
                          {data.map((q, idx) => (
                            <div key={q.id} className="border-b-2 border-dashed border-slate-200 dark:border-slate-700 pb-10 last:border-0 last:pb-0">
                              <h3 className="text-lg font-medium text-slate-800 dark:text-slate-200 mb-4 whitespace-pre-wrap"><span className="font-black mr-2 text-indigo-600 dark:text-indigo-400">Câu {idx + 1}.</span> {q.text}</h3>
                              {q.image && <img src={q.image} className="max-w-full rounded-xl mb-6 shadow border" />}
                              
                              {type !== 'rc' ? renderOptions(type, q, isSubmitted) : (
                                <div className="space-y-6">
                                  {q.subQuestions.map((sq, sIdx) => (
                                    <div key={sq.id} className="p-5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl transition-colors">
                                      <p className="font-bold text-slate-800 dark:text-slate-200 mb-4">#{sIdx+1}: {sq.text}</p>
                                      {renderOptions('rc', sq, isSubmitted)}
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    )
                  })}
                  {!isSubmitted && <button onClick={submitAll} className="w-full bg-green-600 hover:bg-green-700 text-white text-2xl font-black py-5 rounded-2xl shadow-xl transition transform hover:-translate-y-1 mb-10">NỘP BÀI</button>}
                </div>
              )}
            </div>
          </div>
        );
      }

      if (screen === 'result') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100 dark:bg-slate-900 animate-fade-in transition-colors">
            <div className="absolute top-4 right-4"><ThemeToggleBtn /></div>
            <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl p-10 max-w-sm w-full text-center border-t-8 border-green-500 transition-colors">
              <div className="w-24 h-24 bg-green-100 dark:bg-green-900/40 text-green-600 dark:text-green-400 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><Icons.Check /></div>
              <h1 className="text-4xl font-black text-slate-800 dark:text-white mb-2">Tốt Lắm!</h1>
              <div className="bg-slate-50 dark:bg-slate-900 rounded-2xl p-6 mb-8 border border-slate-200 dark:border-slate-700 mt-6 shadow-inner transition-colors">
                <p className="text-sm font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">ĐIỂM CỦA BẠN</p>
                <div className="text-7xl font-black text-blue-600 dark:text-blue-400 drop-shadow-sm">{score.correct} <span className="text-3xl text-slate-300 dark:text-slate-600">/ {score.total}</span></div>
              </div>
              <div className="space-y-3">
                <button onClick={prepareQuiz} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-md transition">Làm lại bài này</button>
                <button onClick={() => setScreen(currentUser ? 'dashboard' : 'home')} className="w-full bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 font-bold py-4 rounded-xl transition-colors">Thoát ra ngoài</button>
              </div>
            </div>
          </div>
        );
      }
      return null;
    }

    function RootApp() {
      if (isSetupNeeded) return <SetupScreen />;
      return <MainApp />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RootApp />);
  </script>
</body>
</html>
