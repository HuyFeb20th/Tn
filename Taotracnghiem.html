  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
  
  <style>
    body { -webkit-font-smoothing: antialiased; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    .animate-bounce-in { animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounceIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    textarea::-webkit-scrollbar { width: 8px; }
    textarea::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
    .dark textarea::-webkit-scrollbar-thumb { background-color: #475569; }
    
    .modern-loader {
      position: relative;
      width: 64px;
      height: 64px;
    }
    .modern-loader::before, .modern-loader::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      animation: pulsate 2s linear infinite;
    }
    .modern-loader::before {
      width: 100%;
      height: 100%;
      background-color: #3b82f6;
      opacity: 0;
    }
    .modern-loader::after {
      width: 100%;
      height: 100%;
      background-color: #3b82f6;
      animation-delay: 1s;
      opacity: 0;
    }
    .dark .modern-loader::before, .dark .modern-loader::after {
      background-color: #60a5fa;
    }
    @keyframes pulsate {
      0% { transform: scale(0); opacity: 0.8; }
      100% { transform: scale(1); opacity: 0; }
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-300">
  <div id="root">
    <div class="fixed inset-0 flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-900 z-[9999] transition-colors duration-300">
      <div class="modern-loader mb-8"></div>
      <p class="text-blue-600 dark:text-blue-400 font-bold tracking-widest uppercase animate-pulse text-sm">Đang khởi tạo...</p>
    </div>
  </div>
  <script src="app.js" type="text/babel"></script>
</body>
</html>
