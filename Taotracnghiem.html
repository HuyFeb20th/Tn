    // TIỆN ÍCH
    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };
    const generateShareCode = () => {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      return Array.from({length: 6}).map(() => chars.charAt(Math.floor(Math.random() * chars.length))).join('');
    };
    const generateId = () => Math.random().toString(36).substr(2, 9);

    // ICONS
    const Icons = {
      Upload: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>,
      Image: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
      Check: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
      Logout: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>,
      Share: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg>,
      Play: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      Copy: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>,
      Trash: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
      User: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
      Sun: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
      Moon: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>,
      Eye: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
      EyeOff: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268-2.943-9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>,
      UserX: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7a4 4 0 11-8 0 4 4 0 018 0zM9 14a6 6 0 00-6 6v1h12v-1a6 6 0 00-6-6zM21 12h-6" /></svg>,
      Edit: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>,
      Key: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>,
      Add: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
    };

    // --- COMPONENT TRẢ LỜI NGẮN ---
    const ShortAnswerInput = ({ value = '', onChange, readOnly, isCorrect, showResult }) => {
      const chars = (value || '').split('');
      const boxes = [0, 1, 2, 3];
      let borderColorClass = 'border-slate-300 dark:border-slate-600';
      let bgColorClass = 'bg-white dark:bg-slate-800';
      let textColorClass = 'text-slate-800 dark:text-slate-100';

      if (showResult) {
        borderColorClass = isCorrect ? 'border-green-500' : 'border-red-500';
        bgColorClass = isCorrect ? 'bg-green-50 dark:bg-green-900/30' : 'bg-red-50 dark:bg-red-900/30';
        textColorClass = isCorrect ? 'text-green-700 dark:text-green-400' : 'text-red-700 dark:text-red-400';
      } else if (value) {
        borderColorClass = 'border-blue-500';
        bgColorClass = 'bg-blue-50 dark:bg-blue-900/30';
      }

      return (
        <div className="relative inline-flex gap-2 group">
          {boxes.map(i => (
            <div key={i} className={`w-12 h-14 flex items-center justify-center text-2xl font-bold border-2 rounded-xl transition-colors duration-200 ${borderColorClass} ${bgColorClass} ${textColorClass} shadow-sm group-hover:border-blue-400`}>
              {chars[i] || ''}
            </div>
          ))}
          <input type="text" inputMode="decimal" pattern="[0-9\.\,\-]*" className="absolute inset-0 w-full h-full opacity-0 cursor-text z-10" value={value}
            onChange={(e) => {
              const filteredValue = e.target.value.replace(/[^0-9\.\,\-]/g, '').slice(0, 4);
              onChange(filteredValue);
            }} readOnly={readOnly} autoComplete="off" />
        </div>
      );
    };

    // ================= APP CHÍNH =================
    function MainApp() {
      const [fbUser, setFbUser] = useState(null);
      const [currentUser, setCurrentUser] = useState(null); 
      const [screen, setScreen] = useState('home'); 
      const [showPassword, setShowPassword] = useState(false);
      const [showUserMenu, setShowUserMenu] = useState(false);
      const [showChangePwd, setShowChangePwd] = useState(false);
      const [globalMessage, setGlobalMessage] = useState({ text: '', type: 'error' });
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, title: '', subtitle: '', onConfirm: null });
      const [theme, setTheme] = useState(localStorage.getItem('quiz_theme') || 'light');
      
      const [allQuizzes, setAllQuizzes] = useState([]);
      const [confirmDeleteId, setConfirmDeleteId] = useState(null);
      const [inputTab, setInputTab] = useState('mc'); 
      const [rawTexts, setRawTexts] = useState({ mc: '', tf: '', sa: '', rc: '', file: '' });

      const [isReadOnly, setIsReadOnly] = useState(false);
      const [currentQuizCode, setCurrentQuizCode] = useState(null);
      const [parsedData, setParsedData] = useState({ mc: [], tf: [], sa: [], rc: [] });
      const [editingQ, setEditingQ] = useState(null); 
      const [config, setConfig] = useState({ mode: 'single', shuffle: 'none' });
      
      const [activeQuiz, setActiveQuiz] = useState({ mc: [], tf: [], sa: [], rc: [], flat: [] });
      const [answers, setAnswers] = useState({}); 
      const [currentIndex, setCurrentIndex] = useState(0); 
      const [isSubmitted, setIsSubmitted] = useState(false); 
      const [singleQuestionConfirmed, setSingleQuestionConfirmed] = useState(false); 
      const [score, setScore] = useState({ correct: 0, total: 0 });
      const [resultComment, setResultComment] = useState("");

      // THEME EFFECT
      useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
        localStorage.setItem('quiz_theme', theme);
      }, [theme]);
      const toggleTheme = () => setTheme(theme === 'light' ? 'dark' : 'light');

      const showMessage = (text, type = 'error') => {
        setGlobalMessage({ text, type });
        setTimeout(() => setGlobalMessage({ text: '', type: 'error' }), 3500);
      };

      const copyToClipboard = async (text) => {
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
            showMessage("Đã copy mã: " + text, "success"); return;
          }
        } catch (err) {}
        const ta = document.createElement("textarea"); ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
        document.body.appendChild(ta); ta.focus(); ta.select();
        try { document.execCommand('copy'); showMessage("Đã copy mã: " + text, "success"); } 
        catch (err) { showMessage("Bôi đen để copy mã nhé.", "error"); }
        document.body.removeChild(ta);
      };

      // FIREBASE EFFECTS
      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => { try { await auth.signInAnonymously(); } catch (error) {} };
        initAuth();
        const unsub = auth.onAuthStateChanged((u) => setFbUser(u));
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!fbUser || !db) return;
        const unsub = db.collection(quizzesPath).onSnapshot((snap) => {
          const list = [];
          snap.forEach(docSnap => {
             const data = docSnap.data();
             const currentExpires = data.expiresAt || (data.createdAt + 30 * 24 * 60 * 60 * 1000);
             list.push({ id: docSnap.id, ...data, expiresAt: currentExpires });
          });
          setAllQuizzes(list);
        }, (err) => console.error(err));
        return () => unsub();
      }, [fbUser]);

      // --- LOGIC TÀI KHOẢN ---
      const handleLogin = async (e) => {
        e.preventDefault();
        const rawUname = e.target.username.value;
        const uname = rawUname.replace(/\s+/g, '');
        const pwd = e.target.password.value;
        if (!uname || !pwd) return showMessage("Vui lòng nhập đủ thông tin.");
        const userRef = db.doc(`${usersPath}/${uname.toLowerCase()}`);
        try {
          const userSnap = await userRef.get();
          if (userSnap.exists) {
            if (userSnap.data().password === pwd) {
              setCurrentUser({ username: userSnap.data().username }); setScreen('dashboard');
            } else showMessage("Sai mật khẩu!");
          } else {
            await userRef.set({ username: uname, password: pwd });
            setCurrentUser({ username: uname }); setScreen('dashboard');
            showMessage("Tạo tài khoản thành công!", "success");
          }
        } catch (error) { showMessage("Lỗi kết nối mạng."); }
      };

      const handleDeleteAccount = async () => {
        if (!currentUser || !db) return;
        setConfirmDialog({
            isOpen: true,
            title: "Tạo Trắc Nghiệm cho biết",
            subtitle: "CẢNH BÁO: Bạn có chắc chắn muốn xóa tài khoản này không?\n\nToàn bộ đề thi do bạn tạo cũng sẽ bị xóa vĩnh viễn. Hành động này không thể hoàn tác!",
            onConfirm: async () => {
                try {
                  const usernameLower = currentUser.username.toLowerCase();
                  const userQuizzes = allQuizzes.filter(q => q.owner === usernameLower);
                  for (const q of userQuizzes) await db.doc(`${quizzesPath}/${q.id}`).delete();
                  await db.doc(`${usersPath}/${usernameLower}`).delete();
                  showMessage("Đã xóa tài khoản!", "success");
                  setCurrentUser(null); setShowUserMenu(false); setScreen('home');
                } catch (error) { showMessage("Lỗi khi xóa!"); }
            }
        });
      };

      const handleChangePassword = async (e) => {
        e.preventDefault();
        const oldPwd = e.target.oldPassword.value;
        const newPwd = e.target.newPassword.value;
        const userRef = db.doc(`${usersPath}/${currentUser.username.toLowerCase()}`);
        try {
          const snap = await userRef.get();
          if (snap.data().password === oldPwd) {
            await userRef.update({ password: newPwd });
            showMessage("Đổi mật khẩu thành công!", "success");
            setShowChangePwd(false);
          } else showMessage("Mật khẩu cũ không đúng!");
        } catch (err) { showMessage("Lỗi đổi mật khẩu!"); }
      };

      // --- PARSING ENGINE SIÊU CẤP ---
      const parseTextEngine = (text, forcedType) => {
        let result = [];
        let currentQ = null, currentSubQ = null;
        let currentSectionType = forcedType; 

        const lines = (text || '').split('\n');
        for (let rawLine of lines) {
          let line = rawLine.replace(/[\u200B\u200C\u200D\uFEFF]/g, '').trim();
          if (!line) continue;

          if (forcedType === 'mixed') {
              const secMatch = line.match(/^[Pp]hần\s+([IVX]+|[1-4])/i);
              if (secMatch) {
                  const secNum = secMatch[1].toUpperCase();
                  if (secNum === 'I' || secNum === '1') currentSectionType = 'mc';
                  else if (secNum === 'II' || secNum === '2') currentSectionType = 'tf';
                  else if (secNum === 'III' || secNum === '3') currentSectionType = 'sa';
                  else if (secNum === 'IV' || secNum === '4') currentSectionType = 'rc';
                  continue; 
              }
          }
          const activeType = currentSectionType === 'mixed' ? 'mc' : currentSectionType;
          const qMatch = line.match(/^[Cc][âa]u\s*\d+[\.\:\)]\s*(.*)/);
          if (qMatch) {
            if (currentQ) result.push(currentQ);
            currentQ = { id: generateId(), text: qMatch[1] || "", type: activeType, options: [], subQuestions: [], image: null };
            currentSubQ = null; continue;
          }
          const subQMatch = line.match(/^#\d+[\.\:\)]\s*(.*)/);
          if (subQMatch && currentQ) {
            currentQ.type = 'rc';
            currentSubQ = { id: generateId(), text: subQMatch[1] || "", options: [] };
            currentQ.subQuestions.push(currentSubQ); continue;
          }
          const optMatch = line.match(/^(\*?)\s*([A-Za-zĐđ])[\.\)\:]\s*(.*)/);
          if (optMatch) {
            const optObj = { id: generateId(), text: optMatch[3], isCorrect: optMatch[1] === '*' };
            if (currentSubQ) currentSubQ.options.push(optObj);
            else if (currentQ) {
              currentQ.options.push(optObj);
              if (!currentQ.type) currentQ.type = 'mc'; 
            }
            continue;
          }
          const saMatch = line.match(/^\*\s*(.+?)\s*\*$/);
          if (saMatch && currentQ && !currentSubQ && currentQ.options.length === 0) {
            currentQ.type = 'sa';
            currentQ.options.push({ id: generateId(), text: saMatch[1], isCorrect: true });
            continue;
          }
          if (currentSubQ) {
            if (currentSubQ.options.length === 0) currentSubQ.text += '\n' + line;
            else currentSubQ.options[currentSubQ.options.length - 1].text += '\n' + line;
          } else if (currentQ) {
            if (currentQ.options.length === 0) currentQ.text += '\n' + line;
            else currentQ.options[currentQ.options.length - 1].text += '\n' + line;
          }
        }
        if (currentQ) result.push(currentQ);
        result.forEach(q => {
            q.text = q.text.trim(); q.options.forEach(o => o.text = o.text.trim());
            if (q.subQuestions) { q.subQuestions.forEach(sq => { sq.text = sq.text.trim(); sq.options.forEach(o => o.text = o.text.trim()); }); }
        });

      // --- LOGIC LƯU VỚI CẢNH BÁO ---
      const handleParseAndSave = async () => {
        // Nếu là đề ĐÃ CÓ trong kho (Sửa text gốc)

            setConfirmDialog({

            executeParseAndSave();

      const executeParseAndSave = async () => {
        let allMC = [], allTF = [], allSA = [], allRC = [];
        if (inputTab === 'file') {
            const mixedItems = parseTextEngine(rawTexts.file, 'mixed');
            mixedItems.forEach(item => {
              if (item.type === 'mc') allMC.push(item); else if (item.type === 'tf') allTF.push(item);
              else if (item.type === 'sa') allSA.push(item); else if (item.type === 'rc') allRC.push(item);
            });
        } else {
            allMC.push(...parseTextEngine(rawTexts.mc, 'mc')); allTF.push(...parseTextEngine(rawTexts.tf, 'tf'));
            allSA.push(...parseTextEngine(rawTexts.sa, 'sa')); allRC.push(...parseTextEngine(rawTexts.rc, 'rc'));
        }

        if (allMC.length === 0 && allTF.length === 0 && allSA.length === 0 && allRC.length === 0) {
          return showMessage('Nội dung nhập vào không đúng định dạng!');
        }

        const newParsedData = { mc: allMC, tf: allTF, sa: allSA, rc: allRC };
        setParsedData(newParsedData);

        if (currentUser && db && !isReadOnly) {
            const usernameLower = currentUser.username.toLowerCase();
            const isAdmin = usernameLower === ADMIN_USERNAME;
            if (!isAdmin && !currentQuizCode && allQuizzes.filter(q => q.owner === usernameLower).length >= MAX_QUIZZES_PER_USER) {
                showMessage(`Giới hạn ${MAX_QUIZZES_PER_USER} đề.`, "error"); setScreen('settings'); return;
            }
            const code = currentQuizCode || generateShareCode();
            let titleLine = "Đề thi không tên";
            const targetText = inputTab === 'file' ? rawTexts.file : (rawTexts.mc || rawTexts.tf || rawTexts.sa || rawTexts.rc);
            const firstLine = (targetText || "").split('\n').find(l => l.trim().length > 0);
            if(firstLine) titleLine = firstLine.length > 50 ? firstLine.substring(0, 50) + "..." : firstLine;
            try {
              await db.doc(`${quizzesPath}/${code}`).set({ 
                  code, owner: usernameLower, title: titleLine, parsedData: newParsedData, rawTexts, 
                  createdAt: Date.now(), expiresAt: Date.now() + 30 * 24 * 60 * 60 * 1000 
              }, {merge: true});
              setCurrentQuizCode(code); showMessage("Đã lưu vào Kho đám mây!", "success");
            } catch (e) {}
        }
        setScreen('settings');
      };

      const handleCancelEdit = () => {

                isOpen: true,

      const handleAddNewQuestion = (sectionId) => {
          const newQ = { id: generateId(), text: "Nội dung câu hỏi mới...", type: sectionId,
            options: sectionId === 'sa' ? [{id: generateId(), text: 'Đáp án', isCorrect: true}] : (sectionId === 'rc' ? [] : [
                {id: generateId(), text: 'Lựa chọn 1', isCorrect: true}, {id: generateId(), text: 'Lựa chọn 2', isCorrect: false}

      // --- LOGIC LÀM ĐỀ & PROGRESS ---
      const prepareQuiz = () => {
        let finalMc = [...parsedData.mc], finalTf = [...parsedData.tf], finalSa = [...parsedData.sa], finalRc = [...(parsedData.rc || [])];
        const shuffleOpts = config.shuffle === 'options' || config.shuffle === 'both';
        const shuffleQ = config.shuffle === 'questions' || config.shuffle === 'both';
        if (shuffleQ) { finalMc = shuffleArray(finalMc); finalTf = shuffleArray(finalTf); finalSa = shuffleArray(finalSa); finalRc = shuffleArray(finalRc); }
        if (shuffleOpts) {
          finalMc.forEach(q => { q.options = shuffleArray(q.options); }); finalTf.forEach(q => { q.options = shuffleArray(q.options); });
          finalRc.forEach(q => { q.subQuestions.forEach(sq => { sq.options = shuffleArray(sq.options); }) });
        }
        setActiveQuiz({ mc: finalMc, tf: finalTf, sa: finalSa, rc: finalRc, flat: [...finalMc, ...finalTf, ...finalSa, ...finalRc] });
        setAnswers({}); setCurrentIndex(0); setIsSubmitted(false); setSingleQuestionConfirmed(false);
        let rcQCount = finalRc.reduce((acc, q) => acc + q.subQuestions.length, 0);
        setScore({ correct: 0, total: finalMc.length + finalTf.length + finalSa.length + rcQCount });

          let hasUnanswered = false;

                <button onClick={() => { setRawTexts({ mc:'', tf:'', sa:'', rc:'', file:'' }); setInputTab('mc'); setParsedData({mc:[], tf:[], sa:[], rc:[]}); setIsReadOnly(false); setCurrentQuizCode(null); setScreen('input'); }} className="bg-blue-600 text-white font-bold px-6 py-3 rounded-xl hover:bg-blue-700 transition shadow-md w-full sm:w-auto">+ TẠO ĐỀ MỚI</button>

dark:text-emerald-400 font-bold rounded-lg text-sm">+7 Ngày</button>{confirmDeleteId === q.id ? <div className="absolute right-0 bottom-12 bg-white dark:bg-slate-800 p-2 rounded-xl shadow-xl border dark:border-red-800 flex gap-2"><button onClick={() => db.doc(`${quizzesPath}/${q.id}`).delete()} className="bg-red-500 text-white px-3 py-1 font-bold rounded text-sm transition">Xóa</button><button onClick={() => setConfirmDeleteId(null)} className="bg-slate-200 px-3 py-1 font-bold rounded text-sm transition">Hủy</button></div> : <button onClick={() => setConfirmDeleteId(q.id)} className="p-2 text-red-500 bg-red-50 dark:bg-red-900/30 rounded-lg hover:bg-red-500 hover:text-white transition"><Icons.Trash /></button>}</div></div>)}</div>}

button></div>)}<button onClick={() => { const newSqs = [...editingQ.data.subQuestions]; newSqs[sqIdx].options.push({id: generateId(), text: '', isCorrect: newSqs[sqIdx].options.length === 0}); setEditingQ({...editingQ, data: {...editingQ.data, subQuestions: newSqs}}); }} className="text-xs bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-3 py-1.5 rounded-lg font-bold mt-2 transition ml-4">+ Thêm tùy chọn</button></div>)}

                {/* NÚT THÊM CÂU HỎI TỔNG QUÁT */}
                {!isReadOnly && (
                    <div className="flex flex-wrap gap-2 mb-6 p-4 bg-slate-50 dark:bg-slate-900/50 rounded-2xl border border-dashed dark:border-slate-700">

                  <div key={section.id} className="mb-10 last:mb-0"><h3 className="font-bold text-lg text-blue-800 dark:text-blue-300 bg-blue-50 dark:bg-blue-900/30 px-4 py-2 rounded-lg mb-4 inline-block border dark:border-blue-800/50">{section.title}</h3><div className="space-y-4">{section.data.map((q, idx) => (
                    <div key={q.id} className="border-2 border-slate-100 dark:border-slate-700 rounded-xl p-4 flex flex-col md:flex-row gap-4 bg-white dark:bg-slate-800 hover:border-blue-200 dark:hover:border-blue-600 transition-colors relative">
                        {!isReadOnly && <button onClick={() => setEditingQ({ sectionId: section.id, data: JSON.parse(JSON.stringify(q)) })} className="absolute top-4 right-4 bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-400 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1 transition shadow-sm"><Icons.Edit /> Sửa</button>}
                        <div className="flex-1 pr-16 md:pr-20"><div className="font-black text-slate-700 dark:text-slate-300 mb-1 text-sm">Câu {idx + 1}:</div><div className="text-slate-800 dark:text-slate-200 whitespace-pre-wrap font-medium">{q.text}</div>{!isReadOnly && q.type === 'sa' && <div className="text-xs text-green-700 dark:text-green-400 mt-2 font-bold bg-green-50 dark:bg-green-900/30 p-2 rounded inline-block">Đáp án: {q.options[0]?.text || '(Rỗng)'}</div>}{q.type === 'rc' && <div className="mt-4 space-y-3 pl-4 border-l-4 dark:border-slate-600">{q.subQuestions.map((sq, sIdx) => <div key={sq.id} className="text-sm"><div className="font-bold text-slate-600 dark:text-slate-400">#{sIdx + 1}: {sq.text}</div>{!isReadOnly && sq.options.filter(o=>o.isCorrect).map(o => <div key={o.id} className="text-xs text-green-600 inline-block mr-2">✓ {o.text}</div>)}</div>)}</div>}</div>
                        <div className="w-full md:w-auto shrink-0 flex items-center justify-center bg-slate-50 dark:bg-slate-900 p-2 rounded-xl border border-dashed dark:border-slate-600">{q.image ? <div className="relative inline-block"><img src={q.image} className="h-28 w-auto object-contain rounded" />{!isReadOnly && <button onClick={() => { const newData = {...parsedData}; newData[section.id].find(x => x.id === q.id).image = null; setParsedData(newData); if (currentUser && currentQuizCode && db) db.doc(`${quizzesPath}/${currentQuizCode}`).update({ parsedData: newData }); }} className="absolute -top-3 -right-3 bg-red-500 text-white rounded-full w-7 h-7 flex items-center justify-center text-sm font-bold shadow hover:bg-red-600 transition">×</button>}</div> : (!isReadOnly ? <label className="cursor-pointer text-blue-600 dark:text-blue-400 font-bold text-sm py-4 px-6 flex flex-col items-center gap-1 transition"><Icons.Image /> Gắn ảnh <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(q.id, section.id, e.target.files[0])} /></label> : <span className="text-slate-400 text-sm px-4 italic">Không có ảnh</span>)}</div>
                    </div>))}</div></div>))}
              </div>
            </div>
          </div>
        );
      }

      // --- MÀN HÌNH LÀM BÀI ---
      if (screen === 'quiz') {
        const totalQ = score.total;
        const isModeSingle = config.mode === 'single';
        const mcLetters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
        const getOptClass = (opt, isSelected, showResult) => {
          if (!showResult) return isSelected ? 'bg-blue-50 dark:bg-blue-900/30 border-blue-400 dark:border-blue-500 text-blue-800 dark:text-blue-200' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 hover:border-blue-300 dark:hover:border-blue-500 text-slate-800 dark:text-slate-200';
          if (opt.isCorrect && isSelected) return 'bg-green-100 dark:bg-green-900/40 border-green-500 text-green-800 dark:text-green-300';
          if (opt.isCorrect && !isSelected) return 'bg-white dark:bg-slate-800 border-green-500 border-dashed text-green-700 dark:text-green-400';
          if (!opt.isCorrect && isSelected) return 'bg-red-100 dark:bg-red-900/40 border-red-500 text-red-800 dark:text-red-300';
          return 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 opacity-50 text-slate-800 dark:text-slate-200';
        };

        const renderOptions = (type, qObj, isConfirming) => {
           if (type === 'sa') return <div className="p-6 bg-slate-50 dark:bg-slate-900 border dark:border-slate-700 rounded-2xl"><p className="text-xs font-bold text-slate-500 mb-3 uppercase">Nhập đáp án:</p><ShortAnswerInput value={answers[qObj.id] || ''} onChange={(v) => !isConfirming && setAnswers({...answers, [qObj.id]: v})} readOnly={isConfirming} showResult={isConfirming} isCorrect={isConfirming ? checkQuestionCorrect('sa', qObj, answers[qObj.id]) : null} />{isConfirming && !checkQuestionCorrect('sa', qObj, answers[qObj.id]) && <div className="mt-4 p-2 bg-green-100 dark:bg-green-900/40 text-green-800 dark:text-green-300 font-bold rounded-lg text-sm border dark:border-green-800">Đáp án đúng: {qObj.options[0]?.text || '...'}</div>}</div>;
           return <div className="grid gap-3">{qObj.options.map((opt, oIdx) => { const isSelected = (answers[qObj.id] || []).includes(opt.id); return <label key={opt.id} className={`flex items-start p-4 border-2 rounded-xl transition cursor-pointer ${getOptClass(opt, isSelected, isConfirming)}`} onClick={() => { if (isConfirming) return; let ns = answers[qObj.id] || []; if (type === 'mc' || type === 'rc') ns = [opt.id]; else ns = ns.includes(opt.id) ? ns.filter(id => id !== opt.id) : [...ns, opt.id]; setAnswers({...answers, [qObj.id]: ns}); }}><input type={type==='tf'?"checkbox":"radio"} checked={isSelected} readOnly className={`mt-1 w-5 h-5 ${type==='tf'?'rounded text-indigo-600':'text-blue-600'}`} /><div className="ml-3 font-medium text-lg whitespace-pre-wrap"><span className="font-bold mr-2">{type==='tf' ? String.fromCharCode(97+oIdx)+')' : mcLetters[oIdx]+'.'}</span>{opt.text}</div></label> })}</div>;
        }

        const confirmSingle = () => {
          const q = activeQuiz.flat[currentIndex];
          if (q.type === 'rc') {
            for (let sq of q.subQuestions) if (!answers[sq.id] || answers[sq.id].length === 0) return showMessage('Hãy làm hết các câu hỏi phụ!');
            let c = 0; q.subQuestions.forEach(sq => { if(checkQuestionCorrect('rc', sq, answers[sq.id])) c++; });
            setScore(p => ({ ...p, correct: p.correct + c }));
          } else {
            const ans = answers[q.id]; if (!ans || (Array.isArray(ans) && ans.length===0) || (typeof ans==='string' && !ans.trim())) return showMessage('Vui lòng trả lời câu này!');
            if (checkQuestionCorrect(q.type, q, ans)) setScore(p => ({ ...p, correct: p.correct + 1 }));
          }
          setSingleQuestionConfirmed(true);
        };

        let ansCount = isModeSingle ? (currentIndex + (singleQuestionConfirmed ? 1 : 0)) : getAnsweredCount();
        const progress = totalQ > 0 ? (ansCount / totalQ) * 100 : 0;

        return (
          <div className="min-h-screen bg-slate-100 dark:bg-slate-900 pb-20 animate-fade-in transition-colors">
            <Notification /><ConfirmModal />
            <div className="sticky top-0 z-50 bg-white/90 dark:bg-slate-800/90 backdrop-blur shadow-sm border-b dark:border-slate-700 transition-colors"><div className="max-w-4xl mx-auto flex items-center justify-between p-4"><div className="font-bold text-slate-700 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 px-4 py-2 rounded-lg border dark:border-slate-600 transition-colors text-sm">Câu: <span className="text-blue-600 dark:text-blue-400">{ansCount}</span> / {totalQ}</div><div className="flex items-center gap-3"><ThemeToggleBtn /><button onClick={() => setConfirmDialog({ isOpen: true, title: "Xác nhận thoát", subtitle: "Thoát sẽ mất kết quả đang làm. Vẫn thoát?", onConfirm: () => setScreen(currentUser ? 'dashboard' : 'home') })} className="font-bold text-red-500 bg-red-50 dark:bg-red-900/30 px-4 py-2 rounded-lg transition border dark:border-red-800/50">Thoát</button></div></div><div className="w-full h-1.5 bg-slate-200 dark:bg-slate-700"><div className="h-full bg-blue-600 dark:bg-blue-500 transition-all duration-500 ease-out" style={{ width: `${progress}%` }}></div></div></div>
            <div className="max-w-3xl mx-auto mt-8 px-4">

                const q = activeQuiz.flat[currentIndex];

              })() : <div className="space-y-8">{['mc', 'tf', 'sa', 'rc'].map(type => { const data = activeQuiz[type]; if(data.length === 0) return null; return <div key={type} className="bg-white dark:bg-slate-800 rounded-3xl shadow-lg overflow-hidden border dark:border-slate-700"><div className="bg-indigo-600 p-4 font-black text-white">{type === 'mc' ? 'I. TRẮC NGHIỆM' : type === 'tf' ? 'II. ĐÚNG / SAI' : type === 'sa' ? 'III. TRẢ LỜI NGẮN' : 'IV. ĐỌC HIỂU'}</div><div className="p-6 md:p-8 space-y-10">{data.map((q, idx) => <div key={q.id} className="border-b-2 border-dashed dark:border-slate-700 pb-10 last:border-0 last:pb-0"><h3 className="text-lg font-medium text-slate-800 dark:text-white mb-4 whitespace-pre-wrap"><span className="font-black mr-2 text-indigo-600">Câu {idx + 1}.</span> {q.text}</h3>{q.image && <img src={q.image} className="max-w-full rounded-xl mb-6 shadow border dark:border-slate-700" />}{type !== 'rc' ? renderOptions(type, q, isSubmitted) : <div className="space-y-6">{q.subQuestions.map((sq, sIdx) => <div key={sq.id} className="p-5 bg-slate-50 dark:bg-slate-900 border dark:border-slate-700 rounded-2xl"><p className="font-bold text-slate-800 dark:text-slate-200 mb-4">#{sIdx+1}: {sq.text}</p>{renderOptions('rc', sq, isSubmitted)}</div>)}</div>}</div>)}</div></div> })}<button onClick={submitFinal} className="w-full bg-green-600 hover:bg-green-700 text-white text-2xl font-black py-5 rounded-2xl shadow-xl transition transform hover:-translate-y-1 mb-10">NỘP BÀI</button></div>}
            </div>
          </div>
        );
      }

      if (screen === 'result') {
        const percent = (score.correct / score.total) * 100;
        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100 dark:bg-slate-900 animate-fade-in transition-colors">
            <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl p-10 max-w-sm w-full text-center border-t-8 border-green-500 transition-colors">
              <h1 className="text-4xl font-black text-slate-800 dark:text-white mb-4">Kết Quả</h1>
              <div className="bg-slate-50 dark:bg-slate-900 rounded-2xl p-6 mb-4 border dark:border-slate-700 shadow-inner"><p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Số câu đúng</p><div className="text-7xl font-black text-blue-600 dark:text-blue-400 drop-shadow-sm">{score.correct}<span className="text-2xl text-slate-300 dark:text-slate-600"> / {score.total}</span></div></div>
              <div className="mb-8 p-4 bg-amber-50 dark:bg-amber-900/20 rounded-xl border border-amber-100 dark:border-amber-800/30 text-amber-800 dark:text-amber-200 font-medium italic">"{resultComment}"</div>
              <div className="space-y-3"><button onClick={prepareQuiz} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-md transition">Làm lại bài này</button><button onClick={() => setScreen(currentUser ? 'dashboard' : 'home')} className="w-full bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 text-slate-700 dark:text-slate-200 font-bold py-4 rounded-xl transition">Về trang chủ</button></div>
            </div>
          </div>
        );
      }
      return null;
    }

    function RootApp() { if (isSetupNeeded) return <SetupScreen />; return <MainApp />; }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RootApp />);
  </script>
</body>
</html>
