    function SetupScreen() {
      return (
        <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100 font-sans">
          <div className="max-w-2xl bg-white p-8 rounded-3xl shadow-xl border border-red-100 text-center">
            <h1 className="text-3xl font-black text-red-600 mb-4">Chưa có kết nối Database!</h1>
            <p className="text-slate-600 mb-4">Hãy dán đoạn mã <code>firebaseConfig</code> của bạn vào dòng số 42 trong code nhé.</p>
          </div>
        </div>
      );
    }

    const ShortAnswerInput = ({ value = '', onChange, readOnly, isCorrect, showResult }) => {
      const chars = (value || '').split('');
      const boxes = [0, 1, 2, 3];
      
      let borderColorClass = 'border-slate-300 dark:border-slate-600';
      let bgColorClass = 'bg-white dark:bg-slate-800';
      let textColorClass = 'text-slate-800 dark:text-slate-100';

      if (showResult) {
        borderColorClass = isCorrect ? 'border-green-500' : 'border-red-500';
        bgColorClass = isCorrect ? 'bg-green-50 dark:bg-green-900/30' : 'bg-red-50 dark:bg-red-900/30';
        textColorClass = isCorrect ? 'text-green-700 dark:text-green-400' : 'text-red-700 dark:text-red-400';
      } else if (value) {
        borderColorClass = 'border-blue-500';
        bgColorClass = 'bg-blue-50 dark:bg-blue-900/30';
      }

      return (
        <div className="relative inline-flex gap-2 group">
          {boxes.map(i => (
            <div key={i} className={`w-12 h-14 flex items-center justify-center text-2xl font-bold border-2 rounded-xl transition-colors duration-200 ${borderColorClass} ${bgColorClass} ${textColorClass} shadow-sm group-hover:border-blue-400`}>
              {chars[i] || ''}
            </div>
          ))}
          <input type="text" inputMode="decimal" pattern="[0-9\.\,\-]*" className="absolute inset-0 w-full h-full opacity-0 cursor-text z-10" value={value}
            onChange={(e) => {
              const filteredValue = e.target.value.replace(/[^0-9\.\,\-]/g, '').slice(0, 4);
              onChange(filteredValue);
            }} readOnly={readOnly} autoComplete="off" />
        </div>
      );
    };

    function MainApp() {
      const [hash, setHash] = useState(() => window.location.hash.replace(/^#\/?/, '') || 'Login');
      
      useEffect(() => {
        const handleHashChange = () => setHash(window.location.hash.replace(/^#\/?/, '') || 'Login');
        window.addEventListener('hashchange', handleHashChange);
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      const navigate = useCallback((path) => {
        window.location.hash = `/${path}`;
      }, []);

      const hashParts = hash.split('/');
      const currentRoute = hashParts[0] ? hashParts[0].toLowerCase() : 'login';
      let urlCode = null;
      let urlAction = null;
      
      if (currentRoute === 'overview' && hashParts[1]) {
         urlCode = hashParts[1];
         if (hashParts[2]) urlAction = hashParts[2].toLowerCase();
      }

      // VIP Route check (Mã hóa dmlw = "vip")
      const isVipRoute = currentRoute === window.atob('dmlw');

      let activeScreen = 'login';
      if (currentRoute === 'login' || currentRoute === '') activeScreen = 'login';
      else if (currentRoute === 'home') activeScreen = 'dashboard';
      else if (currentRoute === 'create') activeScreen = 'input';
      else if (isVipRoute) activeScreen = 'vip_admin';
      else if (currentRoute === 'overview') {
          if (!urlAction) activeScreen = 'overview';
          else if (urlAction === 'test') activeScreen = 'quiz';
          else if (urlAction === 'edittext') activeScreen = 'input';
          else if (urlAction === 'editquestion') activeScreen = 'settings';
          else if (urlAction === 'result') activeScreen = 'result';
      }

      const [fbUser, setFbUser] = useState(null);
      const [currentUser, setCurrentUser] = useState(null); 
      
      const [showPassword, setShowPassword] = useState(false);
      const [showUserMenu, setShowUserMenu] = useState(false);
      const [showChangePwd, setShowChangePwd] = useState(false);
      const [globalMessage, setGlobalMessage] = useState({ text: '', type: 'error' });
      const [theme, setTheme] = useState(localStorage.getItem('quiz_theme') || 'light');
      
      const [allQuizzes, setAllQuizzes] = useState([]);
      const [allUsers, setAllUsers] = useState([]);
      const [inputTab, setInputTab] = useState('mc'); 
      const [rawTexts, setRawTexts] = useState({ mc: '', tf: '', sa: '', rc: '', file: '' });

      const [quizTitle, setQuizTitle] = useState(''); 
      const [isReadOnly, setIsReadOnly] = useState(false);
      const [currentQuizCode, setCurrentQuizCode] = useState(null);
      const [parsedData, setParsedData] = useState({ mc: [], tf: [], sa: [], rc: [] });
      const [editingQ, setEditingQ] = useState(null); 
      const [qSearchTerm, setQSearchTerm] = useState(''); // Mới: Tìm kiếm câu hỏi
      
      const [showAddSectionSelector, setShowAddSectionSelector] = useState(false);
      const [customAlert, setCustomAlert] = useState({ isOpen: false, title: '', message: '', type: 'danger', onConfirm: null, confirmText: 'Đồng ý', cancelText: 'Hủy' });

      const [saveCooldown, setSaveCooldown] = useState(0);
      const [isSaving, setIsSaving] = useState(false);

      const [config, setConfig] = useState({ mode: 'single', shuffle: 'none' });
      const [activeQuiz, setActiveQuiz] = useState({ mc: [], tf: [], sa: [], rc: [], flat: [] });
      const [answers, setAnswers] = useState({}); 
      const [currentIndex, setCurrentIndex] = useState(0); 
      const [isSubmitted, setIsSubmitted] = useState(false); 
      const [singleQuestionConfirmed, setSingleQuestionConfirmed] = useState(false); 
      const [score, setScore] = useState({ correct: 0, total: 0 });
      const [endRemark, setEndRemark] = useState('');

      useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
        localStorage.setItem('quiz_theme', theme);
      }, [theme]);
      const toggleTheme = () => setTheme(theme === 'light' ? 'dark' : 'light');

      useEffect(() => {
         if (currentRoute === 'overview' && isReadOnly) {
            if (activeScreen === 'input' || activeScreen === 'settings') {
               navigate(`Overview/${urlCode}`);
            }
         }
      }, [currentRoute, activeScreen, isReadOnly, urlCode, navigate]);

      useEffect(() => {
         if (currentRoute === 'create' || currentRoute === 'overview') {
            localStorage.setItem('quiz_draft_raw', JSON.stringify(rawTexts));
            localStorage.setItem('quiz_draft_parsed', JSON.stringify(parsedData));
            localStorage.setItem('quiz_draft_title', quizTitle);
            localStorage.setItem('quiz_draft_code', currentQuizCode || '');
         }
      }, [rawTexts, parsedData, quizTitle, currentQuizCode, currentRoute]);

      useEffect(() => {
         try {
           const savedRaw = localStorage.getItem('quiz_draft_raw');
           if (savedRaw) setRawTexts(JSON.parse(savedRaw));
           const savedParsed = localStorage.getItem('quiz_draft_parsed');
           if (savedParsed) setParsedData(JSON.parse(savedParsed));
           setQuizTitle(localStorage.getItem('quiz_draft_title') || '');
           setCurrentQuizCode(localStorage.getItem('quiz_draft_code') || null);
         } catch(e) {}
      }, []);

      useEffect(() => {
          if (currentRoute === 'overview' && urlCode && urlCode !== 'draft' && urlCode !== currentQuizCode) {
              if (db) {
                  db.doc(`${quizzesPath}/${urlCode}`).get().then(snap => {
                      if (snap.exists) {
                          const data = snap.data();
                          if (data.expiresAt > Date.now()) {
                              setParsedData({ mc: [], tf: [], sa: [], rc: [], ...data.parsedData });
                              if (data.rawTexts) setRawTexts(data.rawTexts);
                              setQuizTitle(data.title || '');
                              setCurrentQuizCode(urlCode);
                              const isOwner = currentUser && currentUser.username.toLowerCase() === data.owner;
                              setIsReadOnly(!isOwner);
                          } else {
                              showMessage("Đề thi đã hết hạn!");
                              navigate('Login');
                          }
                      } else {
                          showMessage("Không tìm thấy mã đề!");
                          navigate('Login');
                      }
                  });
              }
          } else if (currentRoute === 'create' && (!urlCode || urlCode === 'draft')) {
              if (currentQuizCode) {
                  setRawTexts({ mc:'', tf:'', sa:'', rc:'', file:'' }); 
                  setParsedData({mc:[], tf:[], sa:[], rc:[]});
                  setQuizTitle('');
                  setCurrentQuizCode(null);
                  setIsReadOnly(false);
              }
          }
      }, [urlCode, currentRoute, db, currentUser, currentQuizCode, navigate]);

      useEffect(() => {
        if (currentRoute === 'create' && !currentQuizCode) {
            setSaveCooldown(10);
            const timerId = setInterval(() => {
                setSaveCooldown((prev) => {
                    if (prev <= 1) { clearInterval(timerId); return 0; }
                    return prev - 1;
                });
            }, 1000);
            return () => clearInterval(timerId);
        } else {
            setSaveCooldown(0);
        }
      }, [currentRoute, currentQuizCode]);

      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => { try { await auth.signInAnonymously(); } catch (error) {} };
        initAuth();
        const unsub = auth.onAuthStateChanged((u) => setFbUser(u));
        return () => unsub();
      }, []);

      useEffect(() => {

      const parseTextEngine = (text, forcedType) => {
        let result = []; let currentQ = null, currentSubQ = null; let currentSectionType = forcedType; 
        const lines = (text || '').split('\n');
        for (let rawLine of lines) {
          let line = rawLine.replace(/[\u200B\u200C\u200D\uFEFF]/g, '').trim();
          if (!line) continue;
          if (forcedType === 'mixed') {
              const secMatch = line.match(/^[Pp]hần\s+([IVX]+|[1-4])/i);
              if (secMatch) {
                  const secNum = secMatch[1].toUpperCase();
                  if (secNum === 'I' || secNum === '1') currentSectionType = 'mc';
                  else if (secNum === 'II' || secNum === '2') currentSectionType = 'tf';
                  else if (secNum === 'III' || secNum === '3') currentSectionType = 'sa';
                  else if (secNum === 'IV' || secNum === '4') currentSectionType = 'rc';
                  continue; 
              }
          }
          const activeType = currentSectionType === 'mixed' ? 'mc' : currentSectionType;
          const qMatch = line.match(/^[Cc][âa]u\s*\d+[\.\:\)]\s*(.*)/);
          if (qMatch) {
            if (currentQ) result.push(currentQ);
            currentQ = { id: generateId(), text: qMatch[1] || "", type: activeType, options: [], subQuestions: [], image: null };
            currentSubQ = null; continue;
          }
          const subQMatch = line.match(/^#\d+[\.\:\)]\s*(.*)/);
          if (subQMatch && currentQ) {
            currentQ.type = 'rc'; currentSubQ = { id: generateId(), text: subQMatch[1] || "", options: [] };
            currentQ.subQuestions.push(currentSubQ); continue;
          }
          const optMatch = line.match(/^(\*?)\s*([A-Za-zĐđ])[\.\)]\s*(.*)/);
          if (optMatch) {
            const optObj = { id: generateId(), text: optMatch[3], isCorrect: optMatch[1] === '*' };
            if (currentSubQ) currentSubQ.options.push(optObj);
            else if (currentQ) { currentQ.options.push(optObj); if (!currentQ.type) currentQ.type = 'mc'; }
            continue;
          }
          const saMatch = line.match(/^\*\s*(.+?)\s*\*$/);
          if (saMatch && currentQ && !currentSubQ && currentQ.options.length === 0) {
            currentQ.type = 'sa'; currentQ.options.push({ id: generateId(), text: saMatch[1], isCorrect: true }); continue;
          }
          if (currentSubQ) {
            if (currentSubQ.options.length === 0) currentSubQ.text += '\n' + line;
            else currentSubQ.options[currentSubQ.options.length - 1].text += '\n' + line;
          } else if (currentQ) {
            if (currentQ.options.length === 0) currentQ.text += '\n' + line;
            else currentQ.options[currentQ.options.length - 1].text += '\n' + line;
          }
        }
        if (currentQ) result.push(currentQ);
        result.forEach(q => {
            q.text = q.text.trim(); q.options.forEach(o => o.text = o.text.trim());
            if (q.subQuestions) q.subQuestions.forEach(sq => { sq.text = sq.text.trim(); sq.options.forEach(o => o.text = o.text.trim()); });
        });
        return result;
      };

      const prepareQuiz = () => {
        let finalMc = [...parsedData.mc], finalTf = [...parsedData.tf], finalSa = [...parsedData.sa], finalRc = [...(parsedData.rc || [])];
        const shuffleOpts = config.shuffle === 'options' || config.shuffle === 'both';
        const shuffleQ = config.shuffle === 'questions' || config.shuffle === 'both';
        if (shuffleQ) { finalMc = shuffleArray(finalMc); finalTf = shuffleArray(finalTf); finalSa = shuffleArray(finalSa); finalRc = shuffleArray(finalRc); }
        if (shuffleOpts) {
          finalMc.forEach(q => { q.options = shuffleArray(q.options); }); finalTf.forEach(q => { q.options = shuffleArray(q.options); });

        }
        setActiveQuiz({ mc: finalMc, tf: finalTf, sa: finalSa, rc: finalRc, flat: [...finalMc, ...finalTf, ...finalSa, ...finalRc] });
        setAnswers({}); setCurrentIndex(0); setIsSubmitted(false); setSingleQuestionConfirmed(false); setEndRemark('');

      const checkQuestionCorrect = (type, qObj, userAns) => {
        if (type === 'mc' || type === 'rc') {
          const correctIds = qObj.options.filter(o => o.isCorrect).map(o => o.id);
          return Array.isArray(userAns) && userAns.length > 0 && correctIds.includes(userAns[0]);
        } else if (type === 'tf') {
          const correctIds = qObj.options.filter(o => o.isCorrect).map(o => o.id);
          return Array.isArray(userAns) && userAns.length === correctIds.length && userAns.every(id => correctIds.includes(id));
        } else if (type === 'sa') {
          if (typeof userAns !== 'string' || !userAns.trim()) return false;
          if (!qObj.options || qObj.options.length === 0) return false; 
          const cleanUser = userAns.trim().replace(',', '.'); const cleanCorrect = qObj.options[0].text.trim().replace(',', '.');
          if (!isNaN(parseFloat(cleanUser)) && !isNaN(parseFloat(cleanCorrect))) return parseFloat(cleanUser) === parseFloat(cleanCorrect);

        }
        return false;
      };

                    </div>
                    <div>
                      <textarea value={editingQ.data.text} onChange={e => setEditingQ({...editingQ, data: {...editingQ.data, text: e.target.value}})} className="w-full p-3 border rounded-xl dark:bg-slate-900 dark:text-white dark:border-slate-600 outline-none" rows="3" />
                    </div>
                    {editingQ.data.type !== 'rc' && (
                      <div>
                        {editingQ.data.options.map((opt, oIdx) => (
                          <div key={opt.id} className="flex items-start gap-3 mb-2">
                            {editingQ.data.type !== 'sa' && <input type="radio" checked={opt.isCorrect} onChange={() => {
                              const newOpts = editingQ.data.options.map(o => ({...o, isCorrect: o.id === opt.id}));
                              setEditingQ({...editingQ, data: {...editingQ.data, options: newOpts}});
                            }} className="mt-3 w-5 h-5" />}
                            <textarea value={opt.text} onChange={e => {
                              const newOpts = [...editingQ.data.options]; newOpts[oIdx].text = e.target.value;
                              setEditingQ({...editingQ, data: {...editingQ.data, options: newOpts}});
                            }} className="flex-1 p-2 border rounded-lg dark:bg-slate-900 dark:text-white dark:border-slate-600" rows="1" />
                            <button onClick={() => {
                                const newOpts = editingQ.data.options.filter(o => o.id !== opt.id);
                                setEditingQ({...editingQ, data: {...editingQ.data, options: newOpts}});
                            }} className="p-2 text-red-500"><Icons.Trash /></button>
                          </div>
                        ))}
                        <button onClick={() => {
                          const newOpts = [...editingQ.data.options, {id: generateId(), text: '', isCorrect: editingQ.data.options.length === 0}];
                          setEditingQ({...editingQ, data: {...editingQ.data, options: newOpts}});
                        }} className="text-xs bg-blue-50 dark:bg-blue-900 text-blue-600 px-3 py-1.5 rounded-lg font-bold">+ Đáp án</button>
                      </div>
                    )}
                    {editingQ.data.type === 'rc' && (
                      <div className="space-y-4">
                        {editingQ.data.subQuestions.map((sq, sqIdx) => (
                          <div key={sq.id} className="p-4 bg-slate-50 dark:bg-slate-900 rounded-xl border">
                            <textarea value={sq.text} onChange={e => {
                                const newSqs = [...editingQ.data.subQuestions]; newSqs[sqIdx].text = e.target.value;
                                setEditingQ({...editingQ, data: {...editingQ.data, subQuestions: newSqs}});
                            }} className="w-full p-2 mb-2 border rounded-lg dark:bg-slate-800 dark:text-white font-bold" rows="1" />
                            {sq.options.map((opt, oIdx) => (
                              <div key={opt.id} className="flex gap-2 mb-1">
                                <input type="radio" checked={opt.isCorrect} onChange={() => {
                                    const newSqs = [...editingQ.data.subQuestions];
                                    newSqs[sqIdx].options = sq.options.map(o => ({...o, isCorrect: o.id === opt.id}));
                                    setEditingQ({...editingQ, data: {...editingQ.data, subQuestions: newSqs}});
                                }} className="mt-1" />
                                <input value={opt.text} onChange={e => {
                                    const newSqs = [...editingQ.data.subQuestions];
                                    newSqs[sqIdx].options[oIdx].text = e.target.value;
                                    setEditingQ({...editingQ, data: {...editingQ.data, subQuestions: newSqs}});
                                }} className="flex-1 text-sm p-1 border rounded dark:bg-slate-800 dark:text-white" />
                              </div>
                            ))}
                            <button onClick={() => {
                                const newSqs = [...editingQ.data.subQuestions];
                                newSqs[sqIdx].options.push({id: generateId(), text: '', isCorrect: newSqs[sqIdx].options.length === 0});
                                setEditingQ({...editingQ, data: {...editingQ.data, subQuestions: newSqs}});
                            }} className="text-[10px] text-blue-600 font-bold">+ Option</button>
                          </div>
                        ))}
                        <button onClick={() => {
                            const newSqs = [...editingQ.data.subQuestions, {id: generateId(), text: 'Phụ mới', options: []}];
                            setEditingQ({...editingQ, data: {...editingQ.data, subQuestions: newSqs}});
                        }} className="text-sm bg-indigo-50 dark:bg-indigo-900 text-indigo-600 px-4 py-2 rounded-lg font-bold w-full">+ Câu hỏi phụ</button>
                      </div>
                    )}
                  </div>
                  <div className="flex gap-3 mt-6">
                    <button onClick={saveInlineEdit} className="flex-1 bg-green-600 text-white font-bold py-3 rounded-xl shadow">Lưu</button>
                    {!editingQ.isNew && <button onClick={removeInlineQuestion} className="flex-1 bg-red-600 text-white font-bold py-3 rounded-xl shadow">Xóa</button>}
                    <button onClick={() => setEditingQ(null)} className="flex-1 bg-slate-200 dark:bg-slate-700 dark:text-white font-bold py-3 rounded-xl">Hủy</button>
                  </div>
                </div>
              </div>
            )}
            <div className="max-w-4xl mx-auto bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-6 md:p-8 border border-slate-200 dark:border-slate-700 transition-colors">
              <div className="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4 border-b border-slate-100 dark:border-slate-700 pb-4">
                <div className="flex items-center gap-3 w-full sm:w-auto">
                   <button onClick={() => navigate(`Overview/${currentQuizCode}`)} className="p-2 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-full"><Icons.ArrowLeft /></button>
                   <h2 className="text-xl font-black dark:text-white">Chi tiết câu hỏi</h2>
                </div>
                {/* Mới: Thanh Tìm Kiếm Câu Hỏi */}
                <div className="relative w-full sm:w-64">
                    <input type="text" placeholder="Tìm số hoặc tên câu..." value={qSearchTerm} onChange={(e) => setQSearchTerm(e.target.value)} 
                        className="w-full pl-10 pr-4 py-2 bg-slate-50 dark:bg-slate-900 border rounded-xl outline-none focus:border-blue-500 font-medium dark:text-white" />
                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Search /></div>
                </div>
                {!isReadOnly && (
                  <button onClick={() => setShowAddSectionSelector(true)} className="flex items-center gap-1 bg-indigo-100 dark:bg-indigo-900 text-indigo-700 dark:text-indigo-300 px-4 py-2.5 rounded-xl font-bold text-sm">
                    <Icons.Plus /> Thêm
                  </button>
                )}
              </div>
              {filteredSections.length === 0 ? <div className="text-center text-slate-400 py-10">Không tìm thấy câu hỏi nào.</div> : filteredSections.map(section => (
                <div key={section.id} className="mb-10">
                  <h3 className="font-bold text-blue-800 dark:text-blue-300 bg-blue-50 dark:bg-blue-900 px-4 py-2 rounded-lg mb-4 inline-block">{section.title}</h3>
                  <div className="space-y-4">
                    {section.data.map((q, idx) => (
                      <div key={q.id} className="border-2 border-slate-100 dark:border-slate-700 rounded-xl p-4 flex flex-col md:flex-row gap-4 bg-white dark:bg-slate-800 hover:border-blue-200 transition-colors relative">
                        {!isReadOnly && <button onClick={() => setEditingQ({ sectionId: section.id, data: JSON.parse(JSON.stringify(q)), isNew: false, oldSectionId: section.id })} className="absolute top-4 right-4 bg-amber-100 dark:bg-amber-900 text-amber-700 dark:text-amber-400 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1"><Icons.Edit /> Sửa</button>}
                        <div className="flex-1 pr-16 md:pr-20">
                          <div className="font-black text-slate-700 dark:text-slate-300 mb-1">Câu {idx + 1}:</div>
                          <div className="text-slate-800 dark:text-slate-200 whitespace-pre-wrap font-medium">{q.text}</div>
                          {(q.type === 'mc' || q.type === 'tf') && (
                              <div className="mt-3 space-y-1 pl-3 border-l-2 border-slate-100 dark:border-slate-700">
                                  {q.options.map(opt => <div key={opt.id} className={`text-xs ${opt.isCorrect ? 'text-green-600 font-bold' : 'text-slate-500'}`}>{opt.isCorrect ? '✓' : '○'} {opt.text}</div>)}
                              </div>
                          )}
                        </div>
                        <div className="w-full md:w-32 h-28 shrink-0 flex items-center justify-center bg-slate-50 dark:bg-slate-900 rounded-xl border border-dashed border-slate-300 dark:border-slate-600 overflow-hidden">
                          {q.image ? <img src={q.image} className="h-full w-auto object-contain" /> : <span className="text-slate-400 text-xs">Không ảnh</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            {showAddSectionSelector && (
              <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                 <div className="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-2xl w-full max-w-sm animate-bounce-in">
                    <h3 className="text-xl font-black mb-4 text-center dark:text-white">Thêm vào phần nào?</h3>
                    <div className="space-y-2">
                       {sections.map(s => <button key={s.id} onClick={() => handleAddNewQuestion(s.id)} className="w-full text-left px-4 py-3 bg-slate-50 dark:bg-slate-900 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-xl font-bold dark:text-white border dark:border-slate-700 transition">{s.title}</button>)}
                    </div>
                    <button onClick={() => setShowAddSectionSelector(false)} className="w-full mt-4 py-3 bg-slate-200 dark:bg-slate-700 font-bold rounded-xl dark:text-white">Hủy</button>
                 </div>
              </div>
            )}
          </div>
        );
      }

      // ================= MÀN HÌNH VIP ADMIN =================
      // (Dùng atob('dmlwX2FkbWlu') nếu muốn giấu sâu hơn, ở đây hiện màn hình trực tiếp nếu đúng route)
      if (activeScreen === 'vip_admin') {
          if (!currentUser || currentUser.username.toLowerCase() !== ADMIN_USERNAME) {
              navigate('Home'); return null;
          }
          const [adminTab, setAdminTab] = useState('quizzes');
          const [adminSearch, setAdminSearch] = useState('');

          const filteredAdminQuizzes = allQuizzes.filter(q => q.title.toLowerCase().includes(adminSearch.toLowerCase()) || q.code.includes(adminSearch.toUpperCase()) || q.owner.includes(adminSearch.toLowerCase()));
          const filteredAdminUsers = allUsers.filter(u => u.username.toLowerCase().includes(adminSearch.toLowerCase()));

          return (
            <div className="min-h-screen p-4 md:p-8 bg-slate-900 text-white animate-fade-in transition-colors">
                <Notification />
                <CustomConfirmModal />
                <div className="max-w-6xl mx-auto">
                    <div className="flex justify-between items-center mb-10 bg-slate-800 p-6 rounded-3xl shadow-xl border border-indigo-500/30">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-indigo-600 rounded-full flex items-center justify-center shadow-lg"><Icons.Shield /></div>
                            <div>
                                <h1 className="text-2xl font-black tracking-tighter uppercase">VIP Control Panel</h1>
                                <p className="text-indigo-400 text-xs font-bold">Quản trị hệ thống trắc nghiệm</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <ThemeToggleBtn />
                            <button onClick={() => navigate('Home')} className="bg-slate-700 px-4 py-2 rounded-xl font-bold hover:bg-slate-600 transition">Thoát</button>
                        </div>
                    </div>

                    <div className="flex flex-col md:flex-row gap-6 mb-8">
                        <div className="flex bg-slate-800 p-1.5 rounded-2xl gap-1 shadow-inner flex-1 md:flex-none">
                            <button onClick={() => setAdminTab('quizzes')} className={`px-8 py-3 rounded-xl font-bold transition ${adminTab === 'quizzes' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400'}`}>Tất cả đề thi</button>
                            <button onClick={() => setAdminTab('users')} className={`px-8 py-3 rounded-xl font-bold transition ${adminTab === 'users' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400'}`}>Người dùng</button>
                        </div>
                        <div className="relative flex-1">
                            <input type="text" placeholder={`Tìm kiếm ${adminTab === 'quizzes' ? 'tên đề, mã, người tạo' : 'tên người dùng'}...`} value={adminSearch} onChange={(e) => setAdminSearch(e.target.value)} 
                                className="w-full bg-slate-800 border border-slate-700 px-12 py-4 rounded-2xl outline-none focus:border-indigo-500 transition" />
                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"><Icons.Search /></div>
                        </div>
                    </div>

                    {adminTab === 'quizzes' ? (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {filteredAdminQuizzes.map(q => (
                                <div key={q.id} className="bg-slate-800 p-5 rounded-2xl border border-slate-700 hover:border-indigo-500/50 transition flex flex-col justify-between">
                                    <div>
                                        <div className="flex justify-between items-start mb-2">
                                            <h3 className="font-bold text-indigo-300 truncate pr-2">{q.title}</h3>
                                            <span className="bg-indigo-900/50 text-indigo-400 px-2 py-0.5 rounded text-[10px] font-black">{q.code}</span>
                                        </div>
                                        <p className="text-xs text-slate-400 mb-4">Bởi: <span className="text-slate-200 font-bold">@{q.owner}</span></p>
                                    </div>
                                    <div className="flex gap-2 pt-4 border-t border-slate-700/50">
                                        <button onClick={() => cloneQuizVIP(q.parsedData, q.title, q.rawTexts)} className="flex-1 bg-indigo-600/20 text-indigo-400 py-2 rounded-lg font-bold hover:bg-indigo-600 hover:text-white transition text-xs">Copy</button>
                                        <button onClick={() => {
                                             setCustomAlert({
                                                isOpen: true, title: "XÓA ĐỀ (VIP)", message: `Xác nhận xóa đề "${q.title}" của @${q.owner}?`,
                                                type: 'danger', confirmText: 'Xóa', cancelText: 'Hủy', onConfirm: () => db.doc(`${quizzesPath}/${q.id}`).delete()
                                             });
                                        }} className="p-2 bg-red-900/30 text-red-500 rounded-lg hover:bg-red-600 hover:text-white transition"><Icons.Trash /></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="bg-slate-800 rounded-2xl overflow-hidden border border-slate-700">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-slate-700/50 text-slate-400 uppercase font-black text-xs">
                                    <tr>
                                        <th className="px-6 py-4">Tài khoản</th>
                                        <th className="px-6 py-4">Mật khẩu</th>
                                        <th className="px-6 py-4 text-center">Hành động</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-700">
                                    {filteredAdminUsers.map(u => (
                                        <tr key={u.id} className="hover:bg-slate-700/30 transition">
                                            <td className="px-6 py-4 font-bold text-indigo-300">@{u.username}</td>
                                            <td className="px-6 py-4 font-mono text-slate-400">{u.password}</td>
                                            <td className="px-6 py-4 flex justify-center gap-2">
                                                <button onClick={() => handleDeleteAccount(u.username)} className="p-2 text-red-500 hover:bg-red-500/20 rounded-lg transition"><Icons.UserX /></button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>
            </div>
          );
      }

      // ================= MÀN HÌNH LÀM BÀI (QUIZ) =================
      if (activeScreen === 'quiz') {
        const totalQ = score.total;
        const isModeSingle = config.mode === 'single';
        const mcLetters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
        
        const getOptClass = (opt, isSelected, showResult) => {
          if (!showResult) return isSelected ? 'bg-blue-50 dark:bg-blue-900/30 border-blue-400 text-blue-800' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 hover:border-blue-300 text-slate-800 dark:text-slate-200';
          if (opt.isCorrect && isSelected) return 'bg-green-100 dark:bg-green-900/40 border-green-500 text-green-800';
          if (opt.isCorrect && !isSelected) return 'bg-white dark:bg-slate-800 border-green-500 border-dashed text-green-700';
          if (!opt.isCorrect && isSelected) return 'bg-red-100 dark:bg-red-900/40 border-red-500 text-red-800';
          return 'bg-white dark:bg-slate-800 border-slate-200 opacity-50 text-slate-800';
        };

        const renderOptions = (type, qObj, isConfirming) => {
           if (type === 'sa') {
             return (
               <div className="p-6 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl">
                 <p className="text-xs font-bold text-slate-500 mb-3 uppercase">Nhập đáp án:</p>
                 <ShortAnswerInput value={answers[qObj.id] || ''} onChange={(v) => !isConfirming && setAnswers({...answers, [qObj.id]: v})} readOnly={isConfirming} showResult={isConfirming} isCorrect={isConfirming ? checkQuestionCorrect('sa', qObj, answers[qObj.id]) : null} />
                 {isConfirming && !checkQuestionCorrect('sa', qObj, answers[qObj.id]) && <div className="mt-4 p-2 bg-green-100 dark:bg-green-900/40 text-green-800 font-bold rounded-lg text-sm border border-green-200">Đáp án đúng: {qObj.options[0]?.text}</div>}
               </div>
             );
           }
           return (
             <div className="grid gap-3">
               {qObj.options.map((opt, oIdx) => {
                 const isSelected = (answers[qObj.id] || []).includes(opt.id);
                 return (
                   <label key={opt.id} className={`flex items-start p-4 border-2 rounded-xl transition cursor-pointer ${getOptClass(opt, isSelected, isConfirming)}`} 
                     onClick={() => {
                       if (isConfirming) return;
                       let newSelected = answers[qObj.id] || [];
                       if (type === 'mc' || type === 'rc') newSelected = [opt.id]; 
                       else newSelected = newSelected.includes(opt.id) ? newSelected.filter(id => id !== opt.id) : [...newSelected, opt.id]; 
                       setAnswers({...answers, [qObj.id]: newSelected});
                     }}>
                     <input type={type==='tf'?"checkbox":"radio"} checked={isSelected} readOnly className={`mt-1 w-5 h-5 shrink-0 ${type==='tf'?'rounded text-indigo-600':'text-blue-600'}`} />
                     <div className="ml-3 font-medium text-lg"><span className="font-bold mr-2">{type==='tf' ? String.fromCharCode(97+oIdx)+')' : mcLetters[oIdx]+'.'}</span>{opt.text}</div>
                   </label>
                 )
               })}
             </div>
           );
        }

        const confirmSingle = () => {
          const q = activeQuiz.flat[currentIndex];
          let isCorrectThisTime = 0;
          if (q.type === 'rc') {
            for (let sq of q.subQuestions) if (!answers[sq.id] || answers[sq.id].length === 0) return showMessage('Vui lòng làm hết!');
            q.subQuestions.forEach(sq => { if(checkQuestionCorrect('rc', sq, answers[sq.id])) isCorrectThisTime++; });
            setScore(p => ({ ...p, correct: p.correct + isCorrectThisTime }));
          } else {
            const ans = answers[q.id];
            if (!ans || (Array.isArray(ans) && ans.length===0) || (typeof ans==='string' && !ans.trim())) return showMessage('Chưa chọn đáp án!');
            if (checkQuestionCorrect(q.type, q, ans)) { isCorrectThisTime = 1; setScore(p => ({ ...p, correct: p.correct + 1 })); }
          }
          setSingleQuestionConfirmed(true);
          if (currentIndex === activeQuiz.flat.length - 1) setEndRemark(generateRandomRemark(score.correct + isCorrectThisTime, totalQ));
        };

        const submitAll = () => {
          let hasUnanswered = false;
          activeQuiz.flat.forEach(q => {
            if(q.type === 'rc') { q.subQuestions.forEach(sq => { if(!answers[sq.id] || answers[sq.id].length===0) hasUnanswered = true; }) }
            else { const ans = answers[q.id]; if(!ans || (Array.isArray(ans)&&ans.length===0) || (typeof ans==='string'&&!ans.trim())) hasUnanswered = true; }
          });
          if (hasUnanswered) return showMessage('Bạn còn câu chưa làm!');
          let correct = 0;
          activeQuiz.flat.forEach(q => {
            if(q.type === 'rc') { q.subQuestions.forEach(sq => { if(checkQuestionCorrect('rc', sq, answers[sq.id])) correct++; }) }
            else { if(checkQuestionCorrect(q.type, q, answers[q.id])) correct++; }
          });
          setScore({ correct, total: totalQ });
          setEndRemark(generateRandomRemark(correct, totalQ));
          setIsSubmitted(true);
          window.scrollTo(0,0);
        };

        let answeredCount = isModeSingle ? (currentIndex + (singleQuestionConfirmed ? 1 : 0)) : getAnsweredCount();
        const progressPercent = totalQ > 0 ? (answeredCount / totalQ) * 100 : 0;

        return (
          <div className="min-h-screen bg-slate-100 dark:bg-slate-900 pb-20 animate-fade-in transition-colors">
            <Notification />
            <CustomConfirmModal />
            <div className="sticky top-0 z-40 bg-white/90 dark:bg-slate-800/90 backdrop-blur shadow-sm border-b dark:border-slate-700">
              <div className="max-w-4xl mx-auto flex items-center justify-between p-4">
                <div className="font-bold dark:text-slate-300 bg-slate-100 dark:bg-slate-700 px-4 py-2 rounded-lg text-sm">Tiến độ: <span className="text-blue-600">{answeredCount}</span> / {totalQ}</div>
                <div className="flex items-center gap-3">
                  <ThemeToggleBtn />
                  <button onClick={() => { setCustomAlert({ isOpen: true, title: "CẢNH BÁO", message: "Thoát sẽ mất kết quả?", type: 'warning', confirmText: 'Vẫn thoát', cancelText: 'Hủy', onConfirm: () => navigate(`Overview/${currentQuizCode || ''}`) }); }} className="font-bold text-red-500 px-4 py-2 rounded-lg">Thoát</button>
                </div>
              </div>
              <div className="w-full h-1.5 bg-slate-200 dark:bg-slate-700"><div className="h-full bg-blue-600 transition-all duration-500" style={{ width: `${progressPercent}%` }}></div></div>
            </div>
            <div className="max-w-3xl mx-auto mt-8 px-4">
              {isModeSingle ? (() => {
                const q = activeQuiz.flat[currentIndex];
                return (
                  <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-6 md:p-10 animate-fade-in border dark:border-slate-700">
                    <span className="bg-indigo-100 dark:bg-indigo-900 text-indigo-800 dark:text-indigo-300 text-xs font-black px-3 py-1 rounded-full uppercase mb-4 inline-block">Câu {currentIndex+1}</span>
                    <div className="text-xl font-medium dark:text-white mb-6 whitespace-pre-wrap">{q.text}</div>
                    {q.image && <img src={q.image} className="max-w-full rounded-xl mb-6 shadow" />}
                    {q.type !== 'rc' ? renderOptions(q.type, q, singleQuestionConfirmed) : (
                      <div className="space-y-6">
                        {q.subQuestions.map((sq, idx) => (
                          <div key={sq.id} className="p-5 bg-slate-50 dark:bg-slate-900 rounded-2xl">
                            <p className="font-bold mb-4 dark:text-slate-200">#{idx+1}: {sq.text}</p>
                            {renderOptions('rc', sq, singleQuestionConfirmed)}
                          </div>
                        ))}
                      </div>
                    )}
                    <div className="flex justify-end pt-6 mt-6 border-t dark:border-slate-700">
                      {!singleQuestionConfirmed ? (
                        <button onClick={confirmSingle} className="bg-blue-600 text-white font-black py-3.5 px-8 rounded-xl shadow-lg w-full md:w-auto transform hover:-translate-y-1">XÁC NHẬN</button>
                      ) : (
                        <button onClick={() => currentIndex < activeQuiz.flat.length - 1 ? (setCurrentIndex(p=>p+1), setSingleQuestionConfirmed(false)) : navigate(`Overview/${currentQuizCode || ''}/Result`)} className="bg-green-600 text-white font-black py-3.5 px-8 rounded-xl shadow-lg w-full md:w-auto flex items-center justify-center gap-2">
                          {currentIndex < activeQuiz.flat.length - 1 ? 'CÂU TIẾP THEO' : 'XEM KẾT QUẢ'} <Icons.Check />
                        </button>
                      )}
                    </div>
                  </div>
                )
              })() : (
                <div className="space-y-8 pb-10">
                  {isSubmitted && (
                    <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl border-4 border-green-500 p-8 text-center animate-fade-in relative overflow-hidden">
                      <h2 className="text-3xl font-black mt-4 mb-2 dark:text-white">ĐIỂM CỦA BẠN</h2>
                      <div className="text-7xl font-black text-green-600 mb-6">{score.correct} <span className="text-4xl text-slate-300">/ {totalQ}</span></div>
                      <div className="mb-6 p-4 bg-amber-50 dark:bg-amber-900/30 rounded-xl border border-amber-200 inline-block">
                         <p className="text-lg font-bold text-amber-800 dark:text-amber-400 italic">"{endRemark}"</p>
                      </div>
                    </div>
                  )}
                  {['mc', 'tf', 'sa', 'rc'].map(type => {
                    const data = activeQuiz[type]; if(data.length === 0) return null;
                    return (
                      <div key={type} className="bg-white dark:bg-slate-800 rounded-3xl shadow-lg overflow-hidden border dark:border-slate-700">
                        <div className="bg-indigo-600 p-4"><h2 className="text-xl font-black text-white">{type.toUpperCase()}</h2></div>
                        <div className="p-6 md:p-8 space-y-10">
                          {data.map((q, idx) => (
                            <div key={q.id} className="border-b-2 border-dashed last:border-0 pb-10 last:pb-0">
                              <h3 className="text-lg font-medium dark:text-slate-200 mb-4 whitespace-pre-wrap"><span className="font-black mr-2 text-indigo-600">Câu {idx + 1}.</span> {q.text}</h3>
                              {q.image && <img src={q.image} className="max-w-full rounded-xl mb-6 shadow" />}
                              {type !== 'rc' ? renderOptions(type, q, isSubmitted) : (
                                <div className="space-y-6">
                                  {q.subQuestions.map((sq, sIdx) => (
                                    <div key={sq.id} className="p-5 bg-slate-50 dark:bg-slate-900 rounded-2xl border">
                                      <p className="font-bold mb-4 dark:text-slate-200">#{sIdx+1}: {sq.text}</p>
                                      {renderOptions('rc', sq, isSubmitted)}
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    )
                  })}
                  {!isSubmitted && <button onClick={submitAll} className="w-full bg-green-600 text-white text-2xl font-black py-5 rounded-2xl shadow-xl transform hover:-translate-y-1">NỘP BÀI</button>}
                </div>
              )}
            </div>
          </div>
        );
      }

      // ================= MÀN HÌNH KẾT QUẢ (SINGLE MODE) =================
      if (activeScreen === 'result') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100 dark:bg-slate-900 transition-colors">
            <div className="absolute top-4 right-4"><ThemeToggleBtn /></div>
            <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl p-8 md:p-10 max-w-sm w-full text-center border-t-8 border-green-500 min-w-0">
              <div className="w-20 h-20 bg-green-100 dark:bg-green-900 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner"><Icons.Check /></div>
              <h1 className="text-3xl font-black dark:text-white mb-2">Xong!</h1>
              <div className="bg-slate-50 dark:bg-slate-900 rounded-2xl p-6 mb-4 border dark:border-slate-700 mt-4 shadow-inner">
                <p className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">ĐIỂM CỦA BẠN</p>
                <div className="text-6xl font-black text-blue-600">{score.correct} <span className="text-3xl text-slate-300">/ {score.total}</span></div>
              </div>
              {endRemark && (
                 <div className="mb-6 px-4 py-3 bg-amber-50 dark:bg-amber-900/30 rounded-xl border border-amber-200">
                    <p className="text-md font-bold text-amber-800 dark:text-amber-400 italic">"{endRemark}"</p>
                 </div>
              )}
              <div className="space-y-3">
                <button onClick={prepareQuiz} className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-md">Làm lại</button>
                <button onClick={() => navigate(currentUser ? 'Home' : 'Login')} className="w-full bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold py-4 rounded-xl transition-colors">Thoát</button>
              </div>
            </div>
          </div>
        );
      }
      return null;
    }

    function RootApp() {
      if (isSetupNeeded) return <SetupScreen />;
      return <MainApp />;
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RootApp />);
  </script>
</body>
</html>
